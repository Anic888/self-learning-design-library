<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" aria-label="Design Library retrieval flow — from brief to verified poster via subagents and style profiles">
  <defs>
    <linearGradient id="paperFlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0e6"/>
      <stop offset="100%" stop-color="#ede5d3"/>
    </linearGradient>
    <linearGradient id="agentFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
  </defs>

  <rect width="900" height="500" rx="12" fill="url(#paperFlow)"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="800" fill="#1c1917">From brief to verified poster</text>
  <text x="450" y="58" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#78350f">How the design-creator agent reads the library, ranks options, and renders SVG</text>

  <!-- Step 1: Brief -->
  <g transform="translate(40,100)">
    <rect width="180" height="68" rx="8" fill="#fef3c7" stroke="#92400e" stroke-width="1.5"/>
    <text x="14" y="22" font-family="ui-sans-serif, sans-serif" font-size="11" font-weight="700" fill="#78350f" letter-spacing="1">1 · BRIEF</text>
    <text x="14" y="40" font-family="ui-sans-serif, sans-serif" font-size="11" fill="#1c1917">"festival poster in</text>
    <text x="14" y="54" font-family="ui-sans-serif, sans-serif" font-size="11" fill="#1c1917">Kilian Eng style"</text>
  </g>

  <!-- Step 2: Library -->
  <g transform="translate(255,90)">
    <rect width="190" height="88" rx="8" fill="url(#agentFill)"/>
    <text x="14" y="22" font-family="ui-sans-serif, sans-serif" font-size="11" font-weight="700" fill="#facc15" letter-spacing="1">2 · LIBRARY READ</text>
    <text x="14" y="40" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#f5f0e6">style-profiles/kilian-eng.md</text>
    <text x="14" y="56" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#a8a29e">principles/composition.md</text>
    <text x="14" y="72" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#a8a29e">research/palettes/2026.md</text>
  </g>

  <!-- Step 3: 3 concept explorers (parallel) -->
  <g transform="translate(480,70)">
    <text x="0" y="-10" font-family="ui-sans-serif, sans-serif" font-size="11" font-weight="700" fill="#78350f" letter-spacing="1">3 · CONCEPT EXPLORERS · ×3</text>
    <g transform="translate(0,0)">
      <rect width="180" height="44" rx="6" fill="#dc2626"/>
      <text x="14" y="22" font-family="ui-sans-serif, sans-serif" font-size="11" font-weight="700" fill="#f5f0e6">A · Type-forward</text>
      <text x="14" y="36" font-family="ui-sans-serif, sans-serif" font-size="10" fill="#fecaca">Scher voice · grid 12 col</text>
    </g>
    <g transform="translate(0,52)">
      <rect width="180" height="44" rx="6" fill="#0c4a6e"/>
      <text x="14" y="22" font-family="ui-sans-serif, sans-serif" font-size="11" font-weight="700" fill="#f5f0e6">B · Image-forward</text>
      <text x="14" y="36" font-family="ui-sans-serif, sans-serif" font-size="10" fill="#bae6fd">Saville voice · single hero</text>
    </g>
    <g transform="translate(0,104)">
      <rect width="180" height="44" rx="6" fill="#16a34a"/>
      <text x="14" y="22" font-family="ui-sans-serif, sans-serif" font-size="11" font-weight="700" fill="#f5f0e6">C · Trend-aggressive</text>
      <text x="14" y="36" font-family="ui-sans-serif, sans-serif" font-size="10" fill="#bbf7d0">Sagmeister × anti-AI</text>
    </g>
  </g>

  <!-- Step 4: Critic -->
  <g transform="translate(700,140)">
    <rect width="170" height="68" rx="8" fill="#92400e"/>
    <text x="14" y="22" font-family="ui-sans-serif, sans-serif" font-size="11" font-weight="700" fill="#fef3c7" letter-spacing="1">4 · CRITIC</text>
    <text x="14" y="40" font-family="ui-sans-serif, sans-serif" font-size="10" fill="#fef3c7">two-pass: constructive</text>
    <text x="14" y="54" font-family="ui-sans-serif, sans-serif" font-size="10" fill="#fef3c7">+ adversarial · ranks 1-3</text>
  </g>

  <!-- Step 5: Render -->
  <g transform="translate(255,260)">
    <rect width="190" height="68" rx="8" fill="#1c1917"/>
    <text x="14" y="22" font-family="ui-sans-serif, sans-serif" font-size="11" font-weight="700" fill="#facc15" letter-spacing="1">5 · RENDER SVG</text>
    <text x="14" y="40" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#f5f0e6">winning concept → SVG</text>
    <text x="14" y="54" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#a8a29e">my-works/YYYY-MM-name/</text>
  </g>

  <!-- Step 6: Verify -->
  <g transform="translate(480,260)">
    <rect width="180" height="68" rx="8" fill="#0c4a6e"/>
    <text x="14" y="22" font-family="ui-sans-serif, sans-serif" font-size="11" font-weight="700" fill="#bae6fd" letter-spacing="1">6 · VERIFY · python</text>
    <text x="14" y="40" font-family="ui-sans-serif, sans-serif" font-size="10" fill="#bae6fd">check-layout.py</text>
    <text x="14" y="54" font-family="ui-sans-serif, sans-serif" font-size="10" fill="#bae6fd">overflow · overlap · scale</text>
  </g>

  <!-- Loop indicator -->
  <g transform="translate(480,346)" font-family="ui-sans-serif, sans-serif" font-size="10" fill="#78350f">
    <text x="90" y="0" text-anchor="middle">fail → fix loop · max 3 iterations</text>
  </g>

  <!-- Step 7: Preview -->
  <g transform="translate(700,260)">
    <rect width="170" height="68" rx="8" fill="#16a34a"/>
    <text x="14" y="22" font-family="ui-sans-serif, sans-serif" font-size="11" font-weight="700" fill="#f0fdf4" letter-spacing="1">7 · PREVIEW</text>
    <text x="14" y="40" font-family="ui-sans-serif, sans-serif" font-size="10" fill="#bbf7d0">open in Safari</text>
    <text x="14" y="54" font-family="ui-sans-serif, sans-serif" font-size="10" fill="#bbf7d0">log to memory</text>
  </g>

  <!-- Connectors -->
  <g stroke="#92400e" stroke-width="1.5" fill="none" stroke-dasharray="4,4" opacity="0.55">
    <path d="M 220 134 L 255 134"/>
    <path d="M 445 134 L 480 92"/>
    <path d="M 445 134 L 480 144"/>
    <path d="M 445 134 L 480 196"/>
    <path d="M 660 174 L 700 174"/>
    <path d="M 785 208 Q 720 240 660 260"/>
    <path d="M 445 294 L 480 294"/>
    <path d="M 660 294 L 700 294"/>
    <path d="M 660 320 Q 600 348 540 332" stroke-dasharray="2,3"/>
    <path d="M 540 332 Q 470 348 460 328" stroke-dasharray="2,3"/>
  </g>

  <!-- Memory feedback loop -->
  <g transform="translate(120,380)">
    <rect width="660" height="62" rx="8" fill="#fef3c7" stroke="#92400e" stroke-width="1.5" stroke-dasharray="6,4"/>
    <text x="14" y="22" font-family="ui-sans-serif, sans-serif" font-size="11" font-weight="700" fill="#78350f" letter-spacing="1">⟲ MEMORY</text>
    <text x="14" y="40" font-family="ui-sans-serif, sans-serif" font-size="11" fill="#1c1917">Winning recipes + rejected crutches logged after each run — bias future</text>
    <text x="14" y="54" font-family="ui-sans-serif, sans-serif" font-size="11" fill="#1c1917">concepts toward what works for this user's voice and project history.</text>
  </g>
</svg>
