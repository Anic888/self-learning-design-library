<?xml version="1.0" encoding="UTF-8"?>
<!-- ================================================================
  POSTER v2 — "LAST SIGNAL"
  Modern sci-fi cinema — isolation / mystery / silence
  612 × 888

  COMPLETE RESTRUCTURE from v1: user feedback was that v1 was
  structurally identical to previous posters (same frame, same
  top-meta, same annotation crutches, same split footer). v2
  rebuilds from Template 04 (field-over-hero) with radical
  minimalism per brief's "silence" requirement.

  WHAT'S REMOVED vs v1:
  - Outer hairline frame rule (gone — full bleed now)
  - Top meta "MISSION · KEPLER-452b · T+2047 DAYS" line (gone)
  - Mission metrics "SIGNAL 4% / O2 / D/EARTH" HUD (gone)
  - Thorp HUD corner brackets (gone)
  - Coordinate ring + "SUBJECT · KERR-9" annotation (gone)
  - 4-line cast billing (gone)
  - Split left/right footer (gone)
  - Over-title italic "a fiction by LIN KERR" (gone)
  - Italic subtitle "a meditation on silence" (gone)
  - Italic tagline quote (gone)
  - Cinematography/score line (gone)

  WHAT REMAINS:
  - Full-bleed dark cosmic field (no frame, no margin crutches)
  - ONE astronaut silhouette (tiny, vast negative space)
  - ONE distant planet (whisper of origin)
  - ONE tether line to dead satellite
  - ONE title "LAST SIGNAL" — roman serif, no italic, no tracking spectacle
  - ONE subtitle — a single credit line
  Nothing else.

  Brief anchors honored:
  - "Wide empty space" — 90%+ negative space
  - "Subject small vs environment" — astronaut ~0.3% canvas area
  - "Soft cosmic light" — single radial glow, no HUD
  - "Elegant cinematic serif" — Georgia 56pt, no tracking spectacle
  - "Isolation, mystery, silence" — silence means REMOVE elements
  - "Avoid cluttered space scenes" — Thorp-level restraint honored

  Palette (5 → 3, stripped down per brief):
  - #030614 — near-black void
  - #0F1E3D — deep navy
  - #E8E8E8 — off-white (type + astronaut + distant stars)
  + auxiliary #A8B8D4 tiny touch on astronaut glow (< 0.5%)
================================================================= -->
<svg xmlns="http://www.w3.org/2000/svg"
     width="612" height="888" viewBox="0 0 612 888"
     preserveAspectRatio="xMidYMid meet">

  <defs>
    <!-- Deep space void: subtle radial gradient, full-bleed -->
    <radialGradient id="voidSpace" cx="0.78" cy="0.38" r="1.2">
      <stop offset="0"    stop-color="#0F1E3D" stop-opacity="0.75"/>
      <stop offset="0.35" stop-color="#08102A"/>
      <stop offset="0.75" stop-color="#030614"/>
      <stop offset="1"    stop-color="#010308"/>
    </radialGradient>

    <!-- Helmet visor with subtle cosmic reflection -->
    <radialGradient id="visor" cx="0.3" cy="0.3" r="0.75">
      <stop offset="0"   stop-color="#A8B8D4" stop-opacity="0.8"/>
      <stop offset="0.5" stop-color="#0F1E3D"/>
      <stop offset="1"   stop-color="#030614"/>
    </radialGradient>

    <!-- Astronaut suit soft light falloff -->
    <linearGradient id="suitLight" x1="0" y1="0" x2="1" y2="0.8">
      <stop offset="0"   stop-color="#E8E8E8"/>
      <stop offset="0.5" stop-color="#A8B8D4"/>
      <stop offset="1"   stop-color="#1A2540"/>
    </linearGradient>

    <!-- Satellite cold metal -->
    <linearGradient id="satBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2A3D5C"/>
      <stop offset="1" stop-color="#0A1428"/>
    </linearGradient>

    <!-- Cosmic glow for subtle halation -->
    <filter id="cosmicGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <filter id="tinyGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="1"/>
    </filter>

    <!-- Film grain for cinematic quality -->
    <filter id="cinemaGrain">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="2" seed="47"/>
      <feColorMatrix values="0 0 0 0 0.65
                             0 0 0 0 0.72
                             0 0 0 0 0.85
                             0 0 0 0.04 0"/>
    </filter>
  </defs>

  <!-- ════════ FULL-BLEED VOID (no frame, no margins) ══════ -->
  <rect width="612" height="888" fill="url(#voidSpace)"/>

  <!-- ════════ DISTANT STARS (sparse, lonely) ══════════════
       Fewer stars than v1. Silence means restraint even in
       atmospheric detail.
  ══════════════════════════════════════════════════════════ -->
  <g fill="#E8E8E8">
    <!-- A few brightest anchors only -->
    <circle cx="148" cy="118" r="0.9" filter="url(#tinyGlow)" opacity="0.85"/>
    <circle cx="342" cy="186" r="0.7" filter="url(#tinyGlow)" opacity="0.75"/>
    <circle cx="488" cy="94" r="0.8" filter="url(#tinyGlow)" opacity="0.8"/>
    <circle cx="72" cy="248" r="0.6" filter="url(#tinyGlow)" opacity="0.7"/>
    <circle cx="214" cy="344" r="0.5" filter="url(#tinyGlow)" opacity="0.7"/>
    <circle cx="508" cy="272" r="0.6" filter="url(#tinyGlow)" opacity="0.7"/>

    <!-- Medium stars, fewer than v1 -->
    <circle cx="244" cy="84" r="0.4" opacity="0.55"/>
    <circle cx="396" cy="240" r="0.4" opacity="0.55"/>
    <circle cx="104" cy="386" r="0.4" opacity="0.5"/>
    <circle cx="556" cy="178" r="0.4" opacity="0.5"/>
    <circle cx="180" cy="222" r="0.35" opacity="0.5"/>
    <circle cx="432" cy="160" r="0.35" opacity="0.5"/>
    <circle cx="292" cy="422" r="0.35" opacity="0.5"/>

    <!-- Faint dust (very few) -->
    <circle cx="60" cy="140" r="0.2" opacity="0.3"/>
    <circle cx="268" cy="160" r="0.2" opacity="0.28"/>
    <circle cx="368" cy="88" r="0.2" opacity="0.28"/>
    <circle cx="540" cy="352" r="0.2" opacity="0.3"/>
    <circle cx="130" cy="310" r="0.2" opacity="0.25"/>
    <circle cx="464" cy="418" r="0.2" opacity="0.28"/>
  </g>

  <!-- ════════ DISTANT PLANET (whisper of origin) ══════════
       Small, upper-left. Where the signal is going.
       No orbital glow ring this time — just the sphere.
  ══════════════════════════════════════════════════════════ -->
  <g transform="translate(126,168)">
    <circle cx="0" cy="0" r="11" fill="#1A2540" opacity="0.7"/>
    <!-- Terminator crescent — lit edge only -->
    <path d="M -11,0 A 11,11 0 0 1 11,0 A 8,11 0 0 0 -11,0 Z"
          fill="#2A3D5C" opacity="0.55"/>
  </g>

  <!-- ════════ DEAD SATELLITE (small, far from subject) ════
       Position upper-right quadrant, separated from astronaut
       by a long tether. This emphasizes "connection fading"
       via the DISTANCE between satellite and figure.
  ══════════════════════════════════════════════════════════ -->
  <g transform="translate(438, 340) rotate(16)">
    <!-- Main satellite body -->
    <rect x="-16" y="-6" width="32" height="12" fill="url(#satBody)"/>

    <!-- Solar panel left (tilted, broken) -->
    <g transform="translate(-22,0) rotate(-10)">
      <rect x="-20" y="-8" width="20" height="16" fill="#1A2540"/>
      <g stroke="#0A1428" stroke-width="0.3" fill="none">
        <line x1="-20" y1="-4" x2="0" y2="-4"/>
        <line x1="-20" y1="0" x2="0" y2="0"/>
        <line x1="-20" y1="4" x2="0" y2="4"/>
        <line x1="-14" y1="-8" x2="-14" y2="8"/>
        <line x1="-8" y1="-8" x2="-8" y2="8"/>
      </g>
    </g>

    <!-- Solar panel right (tilted, damaged corner) -->
    <g transform="translate(22,0) rotate(16)">
      <rect x="0" y="-8" width="18" height="16" fill="#1A2540"/>
      <g stroke="#0A1428" stroke-width="0.3" fill="none">
        <line x1="0" y1="-4" x2="18" y2="-4"/>
        <line x1="0" y1="0" x2="18" y2="0"/>
        <line x1="0" y1="4" x2="18" y2="4"/>
        <line x1="6" y1="-8" x2="6" y2="8"/>
        <line x1="12" y1="-8" x2="12" y2="8"/>
      </g>
      <!-- Broken corner chunk -->
      <path d="M 14,-8 L 18,-8 L 18,-4 Z" fill="#030614"/>
    </g>

    <!-- Antenna (bent) -->
    <line x1="0" y1="-6" x2="-2" y2="-14" stroke="#2A3D5C" stroke-width="0.8"/>
    <ellipse cx="-2" cy="-15" rx="5" ry="1.5" fill="#2A3D5C"/>
  </g>

  <!-- Long tether line — dashed, fading between satellite and astronaut -->
  <path d="M 430,346 Q 400,430 356,550" stroke="#A8B8D4" stroke-width="0.4" stroke-opacity="0.45" fill="none" stroke-dasharray="3,2"/>

  <!-- ════════ ASTRONAUT (tiny, lower-center) ══════════════
       The only figure. 12px tall. Lost in the vastness.
       Positioned lower-center-left, ~x=356, y=560.
  ══════════════════════════════════════════════════════════ -->
  <g transform="translate(356, 560)">

    <!-- Soft cosmic halo around astronaut (single accent < 0.5%) -->
    <circle cx="0" cy="0" r="14" fill="#A8B8D4" opacity="0.1" filter="url(#cosmicGlow)"/>
    <circle cx="0" cy="0" r="7" fill="#A8B8D4" opacity="0.18" filter="url(#cosmicGlow)"/>

    <!-- Suit body -->
    <rect x="-4" y="-2" width="8" height="9" rx="1" fill="url(#suitLight)"/>

    <!-- Helmet -->
    <circle cx="0" cy="-5" r="3.8" fill="url(#visor)"/>
    <circle cx="0" cy="-5" r="3.8" fill="none" stroke="#E8E8E8" stroke-width="0.4"/>
    <!-- Visor reflection -->
    <circle cx="-0.8" cy="-5.8" r="1.3" fill="#A8B8D4" opacity="0.75"/>

    <!-- Arms (spread slightly — zero-g drift) -->
    <rect x="-7" y="0" width="2.5" height="6" rx="0.8" fill="url(#suitLight)" transform="rotate(-18 -5.75 3)"/>
    <rect x="4.5" y="0" width="2.5" height="6" rx="0.8" fill="url(#suitLight)" transform="rotate(24 5.75 3)"/>

    <!-- Legs (bent, drifting) -->
    <rect x="-3" y="6" width="2.5" height="8" rx="0.8" fill="url(#suitLight)" transform="rotate(10 -1.75 10)"/>
    <rect x="0.5" y="6" width="2.5" height="8" rx="0.8" fill="url(#suitLight)" transform="rotate(-8 1.75 10)"/>

    <!-- Small rim highlight on suit (cosmic light source upper-right) -->
    <path d="M -4,-2 L -4,7" stroke="#A8B8D4" stroke-width="0.5" opacity="0.85"/>

    <!-- Dark cast shadow opposite (subtle) -->
    <path d="M 2,14 L 14,22 L 14,18 L 4,12 Z" fill="#030614" opacity="0.55"/>
  </g>

  <!-- ════════ TYPOGRAPHY ═════════════════════════════════
       Radical minimalism. ONE title. ONE credit line. Nothing
       else. Georgia roman (not italic). Moderate tracking,
       not wide-spectacle. Lower-positioned so the cosmic
       emptiness above dominates.
  ══════════════════════════════════════════════════════════ -->

  <!-- MAIN TITLE: LAST SIGNAL — Georgia, roman, restrained -->
  <text x="306" y="752" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="400" fill="#E8E8E8" text-anchor="middle" letter-spacing="4">LAST SIGNAL</text>

  <!-- ONE credit line — no italics, minimal -->
  <text x="306" y="796" font-family="Helvetica, 'Helvetica Neue', Arial, sans-serif" font-size="8" letter-spacing="4" fill="#A8B8D4" fill-opacity="0.75" text-anchor="middle">
    A FILM BY LIN KERR  ·  WINTER MMXXVI
  </text>

  <!-- Cinema grain overlay — VERY subtle, not drawing attention -->
  <rect width="612" height="888" filter="url(#cinemaGrain)" opacity="0.38"/>
</svg>
