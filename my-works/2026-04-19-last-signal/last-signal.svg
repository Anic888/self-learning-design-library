<?xml version="1.0" encoding="UTF-8"?>
<!-- ================================================================
  POSTER — "LAST SIGNAL"
  Modern sci-fi cinema — isolation / mystery / silence
  612 × 888

  Brief: astronaut floating near dead satellite, last connection
  to humanity fading. Wide empty space, subject small vs
  environment. Dark blue + black + subtle white glow. Isolation,
  mystery, silence. Elegant cinematic serif.

  Winning concept: Ultra-minimal Ash Thorp cold cinematic (A).

  Poster-catalog anchors cited from v1.6:
  - Kilian Eng "Blade Runner 2049" (illustration-posters.md) —
    cinematic atmospheric depth, vast scale, tiny figure for scale
  - Ash Thorp NEO-GENESIS (my-works/2026-04-cyber-art-expo/) —
    hairline discipline, near-black + off-white + single accent
  - Kenya Hara emptiness principle — 60%+ negative space as
    strategy (not absence)
  - Saul Bass "Anatomy of a Murder" minimalist sci-fi tradition
    (implicitly — cinematic title poster lineage)

  Designer voice: ash-thorp primary (cold cinematic UI, hairline
  linework, massive negative space, horizon-anchored composition).

  Trend layer: Neo-Futurism / Spatial UI restraint + Dark Academia
  elegant serif typography.

  Strict 5-color palette:
  - #050A1A — near-black void (75% of canvas)
  - #0F1E3D — deep navy (atmospheric middle distance)
  - #2A3D5C — misty blue-gray (Kilian Mode 3 signature)
  - #E8E8E8 — off-white (astronaut highlight, stars, type)
  - #A8B8D4 — subtle cosmic blue glow (single accent, < 5% area)

  ─── GRID PLAN ──────────────────────────────────────────
  Outer frame: y=28 → y=860 (hairline, off-white 0.35 opacity)
  Usable x: 56 → 556

  Vertical anchors:
    y=56   top meta (mission designation)
    y=70   hairline
    y=100-620 hero zone (vast space, subject lower-right)
    y=660  hairline divider
    y=706  "LAST SIGNAL" main title (Georgia 58pt, classical)
    y=738  subtitle italic (20pt)
    y=780  cast billing (small grotesk)
    y=810  tagline italic
    y=840  footer meta
    y=860  frame bottom
  ─────────────────────────────────────────────────────────
================================================================= -->
<svg xmlns="http://www.w3.org/2000/svg"
     width="612" height="888" viewBox="0 0 612 888"
     preserveAspectRatio="xMidYMid meet">

  <defs>
    <!-- Deep space void: subtle radial falloff from upper-right -->
    <radialGradient id="voidSpace" cx="0.85" cy="0.35" r="1.1">
      <stop offset="0"    stop-color="#0F1E3D" stop-opacity="0.85"/>
      <stop offset="0.25" stop-color="#0A1428"/>
      <stop offset="0.55" stop-color="#050A1A"/>
      <stop offset="1"    stop-color="#020508"/>
    </radialGradient>

    <!-- Cosmic nebula wash (very subtle, middle distance) -->
    <radialGradient id="nebulaWash" cx="0.75" cy="0.45" r="0.45">
      <stop offset="0"   stop-color="#2A3D5C" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#1A2540" stop-opacity="0.18"/>
      <stop offset="1"   stop-color="#050A1A" stop-opacity="0"/>
    </radialGradient>

    <!-- Astronaut suit highlight gradient -->
    <linearGradient id="suitHighlight" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0"    stop-color="#E8E8E8"/>
      <stop offset="0.4"  stop-color="#A8B8D4"/>
      <stop offset="1"    stop-color="#2A3D5C"/>
    </linearGradient>

    <!-- Helmet visor reflection -->
    <radialGradient id="visorReflection" cx="0.3" cy="0.3" r="0.7">
      <stop offset="0"   stop-color="#A8B8D4" stop-opacity="0.85"/>
      <stop offset="0.4" stop-color="#2A3D5C" stop-opacity="0.5"/>
      <stop offset="1"   stop-color="#050A1A"/>
    </radialGradient>

    <!-- Satellite body gradient (dead, cold metal) -->
    <linearGradient id="satelliteBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#2A3D5C"/>
      <stop offset="0.5" stop-color="#1A2540"/>
      <stop offset="1"   stop-color="#0A1428"/>
    </linearGradient>

    <!-- Soft cosmic glow filter -->
    <filter id="cosmicGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <!-- Ultra-subtle star twinkle glow -->
    <filter id="starGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Hairline grid (Thorp HUD DNA, nearly invisible) -->
    <pattern id="thorpGrid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 0,0 L 0,40 M 0,0 L 40,0" stroke="#A8B8D4" stroke-width="0.2" opacity="0.08" fill="none"/>
    </pattern>

    <!-- Cosmic grain -->
    <filter id="cosmicGrain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="41"/>
      <feColorMatrix values="0 0 0 0 0.7
                             0 0 0 0 0.75
                             0 0 0 0 0.85
                             0 0 0 0.04 0"/>
    </filter>

    <!-- Clip for hero zone -->
    <clipPath id="heroZone">
      <rect x="28" y="28" width="556" height="632"/>
    </clipPath>
  </defs>

  <!-- ════════ DEEP SPACE VOID ═════════════════════════════ -->
  <rect width="612" height="888" fill="url(#voidSpace)"/>

  <!-- Subtle nebula wash (single soft accent — 5% area rule) -->
  <rect width="612" height="888" fill="url(#nebulaWash)"/>

  <!-- ════════ HAIRLINE OUTER FRAME ════════════════════════ -->
  <rect x="28" y="28" width="556" height="832" fill="none" stroke="#E8E8E8" stroke-width="0.4" stroke-opacity="0.35"/>

  <!-- ════════ TOP META LINE ═══════════════════════════════ -->
  <g font-family="Helvetica, 'Helvetica Neue', Arial, sans-serif" fill="#E8E8E8">
    <text x="56"  y="56" font-size="10" letter-spacing="4" font-weight="700">MISSION · KEPLER-452b</text>
    <text x="556" y="56" font-size="10" letter-spacing="4" text-anchor="end" fill-opacity="0.65">T + 2047 DAYS · SIGNAL FADING</text>
  </g>
  <line x1="56" y1="68" x2="556" y2="68" stroke="#E8E8E8" stroke-width="0.3" stroke-opacity="0.4"/>

  <!-- ════════ HERO ZONE: VAST SPACE + TINY ASTRONAUT ══════ -->
  <g clip-path="url(#heroZone)">

    <!-- Faint Thorp-HUD grid (barely visible, structural discipline) -->
    <rect x="28" y="28" width="556" height="632" fill="url(#thorpGrid)"/>

    <!-- ── DISTANT STARS — scattered, varying sizes/brightness ── -->
    <g fill="#E8E8E8">
      <!-- Brightest anchors -->
      <circle cx="112" cy="98" r="0.9" filter="url(#starGlow)" opacity="0.85"/>
      <circle cx="238" cy="156" r="0.7" filter="url(#starGlow)" opacity="0.75"/>
      <circle cx="402" cy="124" r="1" filter="url(#starGlow)" opacity="0.9"/>
      <circle cx="488" cy="208" r="0.6" filter="url(#starGlow)" opacity="0.7"/>
      <circle cx="86" cy="302" r="0.8" filter="url(#starGlow)" opacity="0.8"/>
      <circle cx="168" cy="424" r="0.5" filter="url(#starGlow)" opacity="0.65"/>
      <circle cx="294" cy="88" r="0.6" filter="url(#starGlow)" opacity="0.7"/>

      <!-- Medium stars -->
      <circle cx="62" cy="148" r="0.5" opacity="0.6"/>
      <circle cx="148" cy="204" r="0.4" opacity="0.55"/>
      <circle cx="192" cy="86" r="0.4" opacity="0.55"/>
      <circle cx="286" cy="196" r="0.5" opacity="0.65"/>
      <circle cx="354" cy="258" r="0.45" opacity="0.55"/>
      <circle cx="432" cy="78" r="0.5" opacity="0.65"/>
      <circle cx="532" cy="142" r="0.5" opacity="0.6"/>
      <circle cx="118" cy="240" r="0.4" opacity="0.5"/>
      <circle cx="220" cy="352" r="0.4" opacity="0.5"/>
      <circle cx="72" cy="396" r="0.5" opacity="0.55"/>
      <circle cx="382" cy="402" r="0.4" opacity="0.5"/>
      <circle cx="512" cy="324" r="0.45" opacity="0.55"/>
      <circle cx="164" cy="512" r="0.4" opacity="0.5"/>
      <circle cx="256" cy="548" r="0.35" opacity="0.5"/>
      <circle cx="542" cy="568" r="0.4" opacity="0.5"/>
      <circle cx="108" cy="580" r="0.35" opacity="0.45"/>

      <!-- Faint dust stars (lots of tiny) -->
      <circle cx="48" cy="86" r="0.25" opacity="0.35"/>
      <circle cx="92" cy="178" r="0.25" opacity="0.3"/>
      <circle cx="132" cy="312" r="0.25" opacity="0.3"/>
      <circle cx="204" cy="114" r="0.25" opacity="0.35"/>
      <circle cx="262" cy="340" r="0.25" opacity="0.3"/>
      <circle cx="322" cy="162" r="0.25" opacity="0.3"/>
      <circle cx="384" cy="226" r="0.25" opacity="0.3"/>
      <circle cx="444" cy="302" r="0.25" opacity="0.3"/>
      <circle cx="506" cy="410" r="0.25" opacity="0.3"/>
      <circle cx="552" cy="248" r="0.25" opacity="0.3"/>
      <circle cx="36" cy="236" r="0.2" opacity="0.25"/>
      <circle cx="178" cy="168" r="0.2" opacity="0.25"/>
      <circle cx="312" cy="452" r="0.2" opacity="0.3"/>
      <circle cx="446" cy="168" r="0.2" opacity="0.25"/>
      <circle cx="578" cy="302" r="0.2" opacity="0.25"/>
      <circle cx="196" cy="478" r="0.2" opacity="0.28"/>
    </g>

    <!-- ── DISTANT EARTH / PLANETARY BODY (tiny, upper-left) ──
         Suggests origin — where the signal is going TO.
         Nearly invisible, just a whisper of blue.
    ─────────────────────────────────────────────────────── -->
    <g transform="translate(120,130)">
      <circle cx="0" cy="0" r="14" fill="#1A2540" opacity="0.7"/>
      <circle cx="0" cy="0" r="14" fill="url(#nebulaWash)" opacity="0.4"/>
      <!-- Terminator crescent: lit edge -->
      <path d="M -14,0 A 14,14 0 0 1 14,0 A 10,14 0 0 0 -14,0 Z"
            fill="#2A3D5C" opacity="0.65"/>
      <!-- Subtle atmospheric glow ring -->
      <circle cx="0" cy="0" r="18" fill="none" stroke="#A8B8D4" stroke-width="0.4" opacity="0.3"/>
    </g>

    <!-- ── DEAD SATELLITE — cold, dark, slightly tumbled ──
         Positioned lower-right-ish. Astronaut nearby.
    ─────────────────────────────────────────────────────── -->
    <g transform="translate(380, 380) rotate(18)">
      <!-- Main satellite body -->
      <rect x="-22" y="-8" width="44" height="16" fill="url(#satelliteBody)" stroke="#0A1428" stroke-width="0.6"/>
      <!-- Body details: panels -->
      <line x1="-22" y1="-4" x2="22" y2="-4" stroke="#050A1A" stroke-width="0.5"/>
      <line x1="-22" y1="0" x2="22" y2="0" stroke="#050A1A" stroke-width="0.5"/>
      <line x1="-22" y1="4" x2="22" y2="4" stroke="#050A1A" stroke-width="0.5"/>
      <line x1="-10" y1="-8" x2="-10" y2="8" stroke="#050A1A" stroke-width="0.5"/>
      <line x1="10" y1="-8" x2="10" y2="8" stroke="#050A1A" stroke-width="0.5"/>

      <!-- Solar panel left (tilted, damaged) -->
      <g transform="translate(-32,0) rotate(-8)">
        <rect x="-28" y="-10" width="28" height="20" fill="#1A2540" stroke="#0A1428" stroke-width="0.6"/>
        <!-- Panel grid -->
        <g stroke="#0A1428" stroke-width="0.3" fill="none">
          <line x1="-28" y1="-6" x2="0" y2="-6"/>
          <line x1="-28" y1="-2" x2="0" y2="-2"/>
          <line x1="-28" y1="2" x2="0" y2="2"/>
          <line x1="-28" y1="6" x2="0" y2="6"/>
          <line x1="-22" y1="-10" x2="-22" y2="10"/>
          <line x1="-14" y1="-10" x2="-14" y2="10"/>
          <line x1="-7" y1="-10" x2="-7" y2="10"/>
        </g>
        <!-- Damage: crack across panel -->
        <path d="M -26,-7 L -16,3 L -5,-2" stroke="#050A1A" stroke-width="0.8" fill="none"/>
      </g>

      <!-- Solar panel right (tilted opposite, partially broken off) -->
      <g transform="translate(32,0) rotate(15)">
        <rect x="0" y="-10" width="24" height="20" fill="#1A2540" stroke="#0A1428" stroke-width="0.6"/>
        <g stroke="#0A1428" stroke-width="0.3" fill="none">
          <line x1="0" y1="-6" x2="24" y2="-6"/>
          <line x1="0" y1="-2" x2="24" y2="-2"/>
          <line x1="0" y1="2" x2="24" y2="2"/>
          <line x1="0" y1="6" x2="24" y2="6"/>
          <line x1="8" y1="-10" x2="8" y2="10"/>
          <line x1="16" y1="-10" x2="16" y2="10"/>
        </g>
        <!-- Broken corner -->
        <path d="M 18,-10 L 24,-10 L 24,-4 Z" fill="#050A1A"/>
      </g>

      <!-- Antenna dish -->
      <g transform="translate(0,-10)">
        <ellipse cx="0" cy="-4" rx="7" ry="2" fill="#2A3D5C" stroke="#0A1428" stroke-width="0.4"/>
        <line x1="0" y1="-4" x2="0" y2="0" stroke="#2A3D5C" stroke-width="1"/>
      </g>

      <!-- Dead signal light (was red/green, now cold) -->
      <circle cx="0" cy="0" r="0.8" fill="#0A1428"/>

      <!-- Broken debris floating nearby -->
      <g fill="#2A3D5C" opacity="0.8">
        <rect x="-40" y="-20" width="2" height="1"/>
        <rect x="42" y="18" width="1.5" height="1.5"/>
        <rect x="-45" y="12" width="1" height="2"/>
        <rect x="50" y="-14" width="1" height="1.5"/>
      </g>
    </g>

    <!-- ── ASTRONAUT — TINY, floating near satellite ──
         Position ~(410, 400) — 30px from satellite.
         Tethered to satellite (subtle line).
         Classic Ash Thorp composition: tiny figure for scale
         against vast environment. See style-profiles/ash-thorp.md
         and my-works/2026-04-cyber-art-expo/NEO-GENESIS-poster-v2-thorp.svg
         for the canonical implementation.
    ─────────────────────────────────────────────────────── -->

    <!-- Tether line from satellite to astronaut (thin, fading) -->
    <path d="M 398,380 Q 405,394 414,406" stroke="#A8B8D4" stroke-width="0.5" stroke-opacity="0.55" fill="none" stroke-dasharray="2,1.5"/>

    <g transform="translate(414, 410)">
      <!-- Subtle cosmic glow halo around astronaut (single accent — the "signal") -->
      <circle cx="0" cy="0" r="18" fill="#A8B8D4" opacity="0.12" filter="url(#cosmicGlow)"/>
      <circle cx="0" cy="0" r="10" fill="#A8B8D4" opacity="0.2" filter="url(#cosmicGlow)"/>

      <!-- Suit body (compact, floating) -->
      <g>
        <!-- Torso/backpack -->
        <rect x="-5" y="-3" width="10" height="11" rx="1.5" fill="#E8E8E8" opacity="0.95"/>
        <!-- Helmet -->
        <circle cx="0" cy="-6" r="4.5" fill="url(#visorReflection)"/>
        <!-- Helmet rim highlight -->
        <circle cx="0" cy="-6" r="4.5" fill="none" stroke="#E8E8E8" stroke-width="0.5" opacity="0.9"/>
        <!-- Visor cosmic glow reflection (tiny) -->
        <circle cx="-1" cy="-7" r="1.5" fill="#A8B8D4" opacity="0.8"/>
        <!-- Arms (slightly spread — floating pose) -->
        <rect x="-8" y="0" width="3" height="7" rx="1" fill="#E8E8E8" opacity="0.9" transform="rotate(-15 -6.5 3)"/>
        <rect x="5" y="0" width="3" height="7" rx="1" fill="#E8E8E8" opacity="0.9" transform="rotate(22 6.5 3)"/>
        <!-- Legs (slightly bent, zero-g float) -->
        <rect x="-4" y="7" width="3" height="9" rx="1" fill="#E8E8E8" opacity="0.9" transform="rotate(8 -2.5 11)"/>
        <rect x="1" y="7" width="3" height="9" rx="1" fill="#E8E8E8" opacity="0.9" transform="rotate(-5 2.5 11)"/>

        <!-- Suit details: chest panel -->
        <rect x="-3" y="-1" width="6" height="3" fill="#2A3D5C" opacity="0.7"/>
        <!-- Small status light (cold — dead) -->
        <circle cx="0" cy="0.5" r="0.4" fill="#0F1E3D"/>

        <!-- Rim light from cosmic source (subtle blue) -->
        <path d="M -5,-3 L -5,8" stroke="#A8B8D4" stroke-width="0.6" opacity="0.85"/>
        <circle cx="-3" cy="-7" r="4" fill="none" stroke="#A8B8D4" stroke-width="0.3" opacity="0.5"/>
      </g>

      <!-- Very long shadow cast from cosmic light (angular) -->
      <path d="M 0,16 L -16,26 L -18,18 L -2,12 Z" fill="#050A1A" opacity="0.5"/>
    </g>

    <!-- ── HAIRLINE HUD CORNERS (Ash Thorp DNA) ─────────────
         Minimal interface hints in corners — cinematic-UI restraint.
    ─────────────────────────────────────────────────────── -->
    <g stroke="#A8B8D4" stroke-width="0.4" stroke-opacity="0.5" fill="none">
      <!-- Top-left HUD bracket -->
      <path d="M 60,90 L 76,90 L 76,94"/>
      <path d="M 60,94 L 70,94"/>
      <!-- Top-right HUD -->
      <path d="M 536,90 L 552,90 L 552,94"/>
      <text x="544" y="88" font-family="'Courier New', Courier, monospace" font-size="6" fill="#A8B8D4" fill-opacity="0.6" text-anchor="middle">04:27:18</text>
      <!-- Bottom-left HUD -->
      <path d="M 60,618 L 76,618 L 76,614"/>
      <!-- Bottom-right HUD -->
      <path d="M 536,618 L 552,618 L 552,614"/>
    </g>

    <!-- Mission metric top-right area (beside HUD) -->
    <g font-family="'Courier New', Courier, monospace" fill="#A8B8D4" fill-opacity="0.6">
      <text x="502" y="120" font-size="7" letter-spacing="1" text-anchor="end">SIGNAL: 4%</text>
      <text x="502" y="130" font-size="7" letter-spacing="1" text-anchor="end">O₂: 11:34</text>
      <text x="502" y="140" font-size="7" letter-spacing="1" text-anchor="end">D/EARTH: 14.2 AU</text>
    </g>

    <!-- Thin coordinate annotation near astronaut -->
    <g stroke="#A8B8D4" stroke-width="0.3" stroke-opacity="0.45" fill="none">
      <circle cx="414" cy="410" r="26"/>
      <line x1="414" y1="384" x2="414" y2="378"/>
      <line x1="414" y1="436" x2="414" y2="442"/>
      <line x1="388" y1="410" x2="382" y2="410"/>
      <line x1="440" y1="410" x2="446" y2="410"/>
    </g>
    <text x="452" y="413" font-family="'Courier New', Courier, monospace" font-size="6" fill="#A8B8D4" fill-opacity="0.55" letter-spacing="1">SUBJECT · KERR-9</text>

    <!-- Cosmic grain -->
    <rect x="28" y="28" width="556" height="632" filter="url(#cosmicGrain)" opacity="0.55"/>
  </g>

  <!-- Hairline divider below hero -->
  <line x1="56" y1="662" x2="556" y2="662" stroke="#E8E8E8" stroke-width="0.35" stroke-opacity="0.4"/>
  <line x1="56" y1="665" x2="556" y2="665" stroke="#E8E8E8" stroke-width="0.15" stroke-opacity="0.25"/>

  <!-- ════════ TITLE BLOCK — classical cinematic serif ══════
       "LAST SIGNAL" in Georgia, wide tracked, restrained weight.
       Dark Academia meets Saul Bass cinematic title lineage.
  ══════════════════════════════════════════════════════════ -->
  <g font-family="Georgia, 'Times New Roman', 'EB Garamond', serif" text-anchor="middle" fill="#E8E8E8">
    <!-- Over-title: italic, small, Dark Academia flavor -->
    <text x="306" y="698" font-size="11" letter-spacing="5" font-style="italic" fill-opacity="0.75">
      a fiction by LIN KERR
    </text>

    <!-- Main title: classical serif, generous tracking -->
    <text x="306" y="738" font-size="52" font-weight="400" letter-spacing="10">LAST SIGNAL</text>

    <!-- Subtitle rule flanks -->
  </g>

  <g stroke="#A8B8D4" stroke-width="0.5" stroke-opacity="0.5">
    <line x1="160" y1="754" x2="250" y2="754"/>
    <line x1="362" y1="754" x2="452" y2="754"/>
  </g>

  <!-- Subtitle italic -->
  <text x="306" y="759" font-family="Georgia, 'Times New Roman', serif" font-size="12" font-style="italic" fill="#A8B8D4" fill-opacity="0.85" letter-spacing="4" text-anchor="middle">
    a meditation on silence
  </text>

  <!-- ════════ TAGLINE ════════════════════════════════════ -->
  <g font-family="Georgia, 'Times New Roman', serif" text-anchor="middle" fill="#E8E8E8" fill-opacity="0.85">
    <text x="306" y="794" font-size="13" font-style="italic">
      "Before the transmission ends, she sees everything."
    </text>
  </g>

  <!-- ════════ CAST BILLING ════════════════════════════════ -->
  <g font-family="Helvetica, 'Helvetica Neue', Arial, sans-serif" text-anchor="middle" fill="#E8E8E8">
    <text x="306" y="820" font-size="10" letter-spacing="3" font-weight="700">
      HIROMI ASANO  ·  CYRIL MENDES  ·  LOUA BENTA
    </text>
  </g>

  <!-- ════════ FOOTER ══════════════════════════════════════ -->
  <line x1="56" y1="838" x2="556" y2="838" stroke="#E8E8E8" stroke-width="0.25" stroke-opacity="0.3"/>

  <g font-family="Helvetica, 'Helvetica Neue', Arial, sans-serif" fill="#E8E8E8" fill-opacity="0.55">
    <text x="56"  y="853" font-size="7" letter-spacing="2">CINEMATOGRAPHY · SHIMA ARAKAWA  ·  SCORE · NILS FRAHM</text>
    <text x="556" y="853" font-size="7" letter-spacing="2" text-anchor="end">WINTER · MMXXVI</text>
  </g>
</svg>
