<?xml version="1.0" encoding="UTF-8"?>
<!-- ================================================================
  SHOWCASE 05 / JOSAN GONZALEZ STYLE
  "NEO // ICHI" — dense cyberpunk character study
  8.5" x 11" vertical (612 x 792 @ 72dpi)

  Style profile applied: style-profiles/josan-gonzalez.md
  Tactical rules enforced:
    - 5-color palette: pink + cyan + yellow + black + white (all together)
    - Central figure dominates, packed environment around
    - Neon signs everywhere (text as environment, not ornament)
    - Kanji scattered as atmospheric layer
    - Bold black outlines (2-3pt) on main elements
    - Chromatic aberration (1-2px RGB split) on edges
    - Zero negative space — FILL EVERYTHING
    - Integrated typography into illustration (signs, HUD, billboards)
    - Comic-adjacent linework
================================================================= -->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="8.5in" height="11in"
     viewBox="0 0 612 792"
     preserveAspectRatio="xMidYMid meet">

  <defs>
    <!-- Deep cyberpunk base -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#0A0015"/>
      <stop offset="0.5" stop-color="#1A0030"/>
      <stop offset="1"   stop-color="#0A0015"/>
    </linearGradient>

    <!-- Character face gradient (yellow to pink rim) -->
    <radialGradient id="faceLight" cx="0.3" cy="0.3" r="0.8">
      <stop offset="0"   stop-color="#FFEC00"/>
      <stop offset="0.4" stop-color="#FFD500"/>
      <stop offset="0.7" stop-color="#FF0080"/>
      <stop offset="1"   stop-color="#1A0030"/>
    </radialGradient>

    <!-- Neon glow filter -->
    <filter id="bigGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>

    <!-- Building window pattern -->
    <pattern id="windowPattern" x="0" y="0" width="14" height="18" patternUnits="userSpaceOnUse">
      <rect width="14" height="18" fill="#0A0015"/>
      <rect x="2" y="2"  width="4" height="5" fill="#FFEC00" fill-opacity="0.6"/>
      <rect x="8" y="2"  width="4" height="5" fill="#FF0080" fill-opacity="0.5"/>
      <rect x="2" y="10" width="4" height="5" fill="#00F0FF" fill-opacity="0.5"/>
      <rect x="8" y="10" width="4" height="5" fill="#FFEC00" fill-opacity="0.4"/>
    </pattern>
  </defs>

  <!-- =========================================================
       LAYER 1 — Deep cyberpunk background
       ========================================================= -->
  <g id="Layer_Background">
    <rect x="0" y="0" width="612" height="792" fill="url(#bgGrad)"/>
  </g>

  <!-- =========================================================
       LAYER 2 — Dense city architecture (background layer)
       Multiple building silhouettes, packed, overlapping
       ========================================================= -->
  <g id="Layer_CityBackground">
    <!-- Far buildings with lit windows -->
    <rect x="0"   y="280" width="80"  height="300" fill="url(#windowPattern)"/>
    <rect x="80"  y="320" width="50"  height="260" fill="url(#windowPattern)"/>
    <rect x="130" y="260" width="70"  height="320" fill="url(#windowPattern)"/>
    <rect x="200" y="300" width="40"  height="280" fill="url(#windowPattern)"/>
    <rect x="395" y="290" width="60"  height="290" fill="url(#windowPattern)"/>
    <rect x="455" y="270" width="80"  height="310" fill="url(#windowPattern)"/>
    <rect x="535" y="310" width="77"  height="270" fill="url(#windowPattern)"/>
    <!-- Dark outlines on buildings -->
    <g stroke="#000000" stroke-width="1.8" fill="none">
      <rect x="0"   y="280" width="80"  height="300"/>
      <rect x="80"  y="320" width="50"  height="260"/>
      <rect x="130" y="260" width="70"  height="320"/>
      <rect x="200" y="300" width="40"  height="280"/>
      <rect x="395" y="290" width="60"  height="290"/>
      <rect x="455" y="270" width="80"  height="310"/>
      <rect x="535" y="310" width="77"  height="270"/>
    </g>
    <!-- Antennas on rooftops -->
    <g stroke="#00F0FF" stroke-width="1.5" fill="none">
      <line x1="40" y1="280" x2="40" y2="258"/>
      <line x1="165" y1="260" x2="165" y2="230"/>
      <line x1="495" y1="270" x2="495" y2="240"/>
    </g>
    <!-- Pipes / cables crossing in background -->
    <g stroke="#000000" stroke-width="3" fill="none">
      <path d="M 0 440 Q 150 430 300 440 T 612 440"/>
      <path d="M 0 470 Q 200 460 400 470 T 612 470"/>
    </g>
    <g stroke="#FF0080" stroke-width="1.2" fill="none" opacity="0.6">
      <path d="M 0 438 Q 150 428 300 438 T 612 438"/>
    </g>
  </g>

  <!-- =========================================================
       LAYER 3 — Scattered KANJI characters (atmospheric layer)
       ========================================================= -->
  <g id="Layer_KanjiBackground" font-family="'Noto Serif JP', serif" font-weight="900">
    <text x="40"  y="180" font-size="52" fill="#FF0080" opacity="0.85"
          transform="rotate(-4 40 180)">壱</text>
    <text x="540" y="200" font-size="48" fill="#00F0FF" opacity="0.8"
          transform="rotate(3 540 200)">夜</text>
    <text x="30"  y="650" font-size="44" fill="#FFEC00" opacity="0.85"
          transform="rotate(-6 30 650)">電</text>
    <text x="540" y="670" font-size="46" fill="#FF0080" opacity="0.8"
          transform="rotate(4 540 670)">都</text>
    <text x="280" y="130" font-size="34" fill="#00F0FF" opacity="0.7"
          transform="rotate(-2 280 130)">未来</text>
  </g>

  <!-- =========================================================
       LAYER 4 — Multiple billboard signs (packed environment)
       ========================================================= -->
  <g id="Layer_Billboards">
    <!-- Top-left pink billboard -->
    <g transform="translate(50, 90) rotate(-2)">
      <rect x="0" y="0" width="130" height="40" fill="#FF0080"
            stroke="#000000" stroke-width="2.5"/>
      <text x="65" y="28" text-anchor="middle"
            font-family="Impact, sans-serif" font-size="18" font-weight="900"
            fill="#FFFFFF" letter-spacing="1">NEO·DRINK</text>
    </g>

    <!-- Top-right cyan billboard -->
    <g transform="translate(420, 100) rotate(3)">
      <rect x="0" y="0" width="140" height="36" fill="#00F0FF"
            stroke="#000000" stroke-width="2.5"/>
      <text x="70" y="26" text-anchor="middle"
            font-family="Impact, sans-serif" font-size="16" font-weight="900"
            fill="#1A0030" letter-spacing="1">CYBER♡MEAT</text>
    </g>

    <!-- Mid-left yellow vertical sign -->
    <g transform="translate(16, 320) rotate(-90 60 100)">
      <rect x="0" y="0" width="130" height="30" fill="#FFEC00"
            stroke="#000000" stroke-width="2"/>
      <text x="65" y="22" text-anchor="middle"
            font-family="Impact, sans-serif" font-size="16" font-weight="900"
            fill="#000000" letter-spacing="2">HOT · SUSHI · HOT</text>
    </g>

    <!-- Mid-right pink sign -->
    <g transform="translate(560, 330) rotate(-90 30 100)">
      <rect x="0" y="0" width="130" height="26" fill="#FF0080"
            stroke="#000000" stroke-width="2"/>
      <text x="65" y="20" text-anchor="middle"
            font-family="Impact, sans-serif" font-size="14" font-weight="900"
            fill="#FFFFFF" letter-spacing="2">LOVE·STATION</text>
    </g>

    <!-- Small circular cyan sign upper middle -->
    <circle cx="306" cy="100" r="28" fill="#00F0FF" stroke="#000000" stroke-width="2.5"/>
    <text x="306" y="106" text-anchor="middle"
          font-family="Impact, sans-serif" font-size="14" font-weight="900"
          fill="#1A0030">24H</text>
  </g>

  <!-- =========================================================
       LAYER 5 — Central Hero Figure (cyberpunk character)
       Stylized face + jacket silhouette
       ========================================================= -->
  <g id="Layer_HeroFigure">
    <!-- RGB split underlay (chromatic aberration) -->
    <g transform="translate(-3, 0)" opacity="0.6">
      <ellipse cx="306" cy="400" rx="85" ry="110" fill="#FF0080"/>
    </g>
    <g transform="translate(3, 0)" opacity="0.6">
      <ellipse cx="306" cy="400" rx="85" ry="110" fill="#00F0FF"/>
    </g>

    <!-- Jacket/body (black silhouette with colored rim) -->
    <path d="M 220 600 L 240 460 Q 260 420 306 420 Q 352 420 372 460 L 392 600 Q 392 620 380 620 L 232 620 Q 220 620 220 600 Z"
          fill="#000000" stroke="#FF0080" stroke-width="4"/>

    <!-- Head (cyan rim-lit) -->
    <ellipse cx="306" cy="380" rx="80" ry="100" fill="url(#faceLight)"
             stroke="#000000" stroke-width="3.5"/>

    <!-- Visor / tech glasses (iconic cyberpunk element) -->
    <rect x="240" y="360" width="132" height="22" fill="#000000"
          stroke="#00F0FF" stroke-width="2"/>
    <!-- Visor reflection lines -->
    <line x1="248" y1="366" x2="260" y2="366" stroke="#00F0FF" stroke-width="1.2"/>
    <line x1="268" y1="366" x2="280" y2="366" stroke="#00F0FF" stroke-width="1.2"/>
    <line x1="328" y1="370" x2="340" y2="370" stroke="#FF0080" stroke-width="1.2"/>
    <line x1="348" y1="370" x2="364" y2="370" stroke="#FF0080" stroke-width="1.2"/>
    <!-- Data readouts in visor -->
    <text x="244" y="377"
          font-family="'Courier New', monospace" font-size="5"
          fill="#00F0FF">01:47</text>
    <text x="332" y="377"
          font-family="'Courier New', monospace" font-size="5"
          fill="#FF0080">TGT.LOCKED</text>

    <!-- Hair (messy cyberpunk) -->
    <path d="M 226 340 Q 230 280 280 285 Q 306 270 332 285 Q 382 280 386 340 Q 370 300 340 302 Q 306 292 272 302 Q 242 300 226 340 Z"
          fill="#FF0080" stroke="#000000" stroke-width="3"/>
    <!-- Hair highlights -->
    <g stroke="#FFEC00" stroke-width="1.5" fill="none">
      <path d="M 250 300 Q 260 285 280 290"/>
      <path d="M 320 290 Q 340 285 355 300"/>
    </g>

    <!-- Mouth (expressionless line) -->
    <path d="M 290 420 L 322 420" stroke="#000000" stroke-width="3" stroke-linecap="round"/>

    <!-- Neck tech connector -->
    <rect x="294" y="450" width="24" height="14" fill="#00F0FF" stroke="#000000" stroke-width="2"/>
    <circle cx="300" cy="457" r="1.5" fill="#FF0080"/>
    <circle cx="306" cy="457" r="1.5" fill="#FFEC00"/>
    <circle cx="312" cy="457" r="1.5" fill="#FF0080"/>

    <!-- Jacket details: zipper + collar -->
    <line x1="306" y1="470" x2="306" y2="600" stroke="#FF0080" stroke-width="2.5"/>
    <circle cx="306" cy="490" r="2.5" fill="#FFEC00" stroke="#000000" stroke-width="1"/>
    <circle cx="306" cy="515" r="2.5" fill="#FFEC00" stroke="#000000" stroke-width="1"/>
    <circle cx="306" cy="540" r="2.5" fill="#FFEC00" stroke="#000000" stroke-width="1"/>
    <circle cx="306" cy="565" r="2.5" fill="#FFEC00" stroke="#000000" stroke-width="1"/>

    <!-- Collar sharp lines -->
    <path d="M 240 460 L 270 465 L 290 480" stroke="#00F0FF" stroke-width="2.5" fill="none"/>
    <path d="M 372 460 L 342 465 L 322 480" stroke="#00F0FF" stroke-width="2.5" fill="none"/>

    <!-- Shoulder patch/badge -->
    <polygon points="248,472 268,472 268,490 248,490" fill="#FFEC00" stroke="#000000" stroke-width="1.5"/>
    <text x="258" y="484" text-anchor="middle"
          font-family="Impact, sans-serif" font-size="8" font-weight="900"
          fill="#000000">壱</text>
  </g>

  <!-- =========================================================
       LAYER 6 — Floating foreground signs (tension with figure)
       ========================================================= -->
  <g id="Layer_ForegroundSigns">
    <!-- Small hovering pink sign right of figure -->
    <g transform="translate(408, 380) rotate(8)">
      <rect x="0" y="0" width="80" height="20" fill="#FF0080"
            stroke="#000000" stroke-width="1.8"/>
      <text x="40" y="14" text-anchor="middle"
            font-family="Impact, sans-serif" font-size="11" font-weight="900"
            fill="#FFFFFF" letter-spacing="1">FOLLOW·ME</text>
    </g>

    <!-- Small hovering yellow sign left of figure -->
    <g transform="translate(120, 410) rotate(-5)">
      <rect x="0" y="0" width="72" height="20" fill="#FFEC00"
            stroke="#000000" stroke-width="1.8"/>
      <text x="36" y="14" text-anchor="middle"
            font-family="Impact, sans-serif" font-size="11" font-weight="900"
            fill="#000000" letter-spacing="1">SIGNAL+</text>
    </g>

    <!-- Price tag hovering -->
    <g transform="translate(440, 500) rotate(-12)">
      <polygon points="0,0 40,0 50,15 40,30 0,30" fill="#00F0FF"
               stroke="#000000" stroke-width="1.8"/>
      <text x="20" y="20" text-anchor="middle"
            font-family="Impact, sans-serif" font-size="12" font-weight="900"
            fill="#1A0030">¥999</text>
    </g>
  </g>

  <!-- =========================================================
       LAYER 7 — Wires/cables crossing foreground
       ========================================================= -->
  <g id="Layer_Wires">
    <g stroke="#000000" stroke-width="2.5" fill="none">
      <path d="M 0 165 Q 306 145 612 172"/>
      <path d="M 0 192 Q 306 178 612 198"/>
      <path d="M 0 730 Q 306 715 612 740"/>
    </g>
    <g stroke="#FF0080" stroke-width="1" fill="none" opacity="0.7">
      <path d="M 0 163 Q 306 143 612 170"/>
    </g>
    <g stroke="#00F0FF" stroke-width="1" fill="none" opacity="0.7">
      <path d="M 0 194 Q 306 180 612 200"/>
    </g>
  </g>

  <!-- =========================================================
       LAYER 8 — Hero Title (integrated signage)
       ========================================================= -->
  <g id="Layer_HeroTitle">
    <!-- Yellow title banner bottom, tilted slightly -->
    <g transform="translate(56, 660) rotate(-2)">
      <rect x="0" y="0" width="500" height="70" fill="#FFEC00"
            stroke="#000000" stroke-width="4"/>
      <!-- Inner pink stripe -->
      <rect x="6" y="6" width="488" height="58" fill="#FF0080"
            stroke="#FFFFFF" stroke-width="1.5"/>

      <!-- Title text with RGB split -->
      <text x="254" y="44" text-anchor="middle"
            font-family="Impact, 'Arial Black', sans-serif"
            font-size="36" font-weight="900" letter-spacing="4"
            fill="#00F0FF" transform="translate(-2,0)">NEO // ICHI</text>
      <text x="250" y="44" text-anchor="middle"
            font-family="Impact, 'Arial Black', sans-serif"
            font-size="36" font-weight="900" letter-spacing="4"
            fill="#FFEC00" transform="translate(2,0)">NEO // ICHI</text>
      <text x="252" y="44" text-anchor="middle"
            font-family="Impact, 'Arial Black', sans-serif"
            font-size="36" font-weight="900" letter-spacing="4"
            fill="#FFFFFF">NEO // ICHI</text>

      <!-- Subtitle -->
      <text x="252" y="60" text-anchor="middle"
            font-family="'Courier New', monospace" font-size="9"
            fill="#FFFFFF" letter-spacing="6" font-weight="700">
        THE FUTURE IS NOW · VOLUME 01
      </text>
    </g>
  </g>

  <!-- =========================================================
       LAYER 9 — Footer signs strip
       ========================================================= -->
  <g id="Layer_FooterStrip">
    <rect x="0" y="755" width="612" height="37" fill="#000000"/>
    <!-- Scrolling-sign style repeating text -->
    <text x="0" y="780"
          font-family="Impact, sans-serif" font-size="20" font-weight="900"
          fill="#FF0080" letter-spacing="3">BUY·NOW</text>
    <text x="130" y="780"
          font-family="Impact, sans-serif" font-size="20" font-weight="900"
          fill="#00F0FF" letter-spacing="3">·FOREVER·</text>
    <text x="306" y="780"
          font-family="Impact, sans-serif" font-size="20" font-weight="900"
          fill="#FFEC00" letter-spacing="3">BUY·NOW</text>
    <text x="436" y="780"
          font-family="Impact, sans-serif" font-size="20" font-weight="900"
          fill="#FF0080" letter-spacing="3">·FOREVER·</text>
  </g>

</svg>
