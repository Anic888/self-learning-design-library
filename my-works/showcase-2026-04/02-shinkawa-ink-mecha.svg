<?xml version="1.0" encoding="UTF-8"?>
<!-- ================================================================
  SHOWCASE 02 / YOJI SHINKAWA STYLE
  "影" (Kage / Shadow) — fictional mecha character study
  8.5" x 11" vertical (612 x 792 @ 72dpi)

  Style profile applied: style-profiles/yoji-shinkawa.md
  Tactical rules enforced:
    - Bone-white paper background (#F5F0E0)
    - Single black-ink figure centered, ~60% of height
    - Brushstroke simulation through varying stroke-width paths
    - Splatter/drip dots around figure for energy
    - ONE red accent element (seal/stamp corner)
    - Single Japanese kanji as calligraphic label
    - 50%+ negative space (paper as environment)
    - Zero other colors, zero gradients, zero digital shading
================================================================= -->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="8.5in" height="11in"
     viewBox="0 0 612 792"
     preserveAspectRatio="xMidYMid meet">

  <defs>
    <!-- Bone-white warm paper background -->
    <linearGradient id="paperGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#F5F0E0"/>
      <stop offset="1"   stop-color="#EAE3D1"/>
    </linearGradient>

    <!-- Very subtle paper noise texture -->
    <pattern id="paperGrain" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="none"/>
      <circle cx="2" cy="3" r="0.35" fill="#0E0E0E" fill-opacity="0.03"/>
      <circle cx="6" cy="5" r="0.25" fill="#0E0E0E" fill-opacity="0.02"/>
      <circle cx="4" cy="7" r="0.3"  fill="#0E0E0E" fill-opacity="0.025"/>
    </pattern>

    <!-- Wet edge blur filter (ink bleed on paper) -->
    <filter id="wetBleed" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
    <filter id="wetBleedMore" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.8"/>
    </filter>
  </defs>

  <!-- =========================================================
       LAYER 1 — Paper background
       ========================================================= -->
  <g id="Layer_Paper">
    <rect x="0" y="0" width="612" height="792" fill="url(#paperGrad)"/>
    <rect x="0" y="0" width="612" height="792" fill="url(#paperGrain)"/>
  </g>

  <!-- =========================================================
       LAYER 2 — Sumi ink wash (atmospheric — single soft pool below figure)
       ========================================================= -->
  <g id="Layer_InkWash">
    <!-- Wet wash under figure (suggests ground/atmosphere) -->
    <ellipse cx="306" cy="630" rx="180" ry="24"
             fill="#0E0E0E" fill-opacity="0.08" filter="url(#wetBleedMore)"/>
    <ellipse cx="306" cy="632" rx="140" ry="14"
             fill="#0E0E0E" fill-opacity="0.12" filter="url(#wetBleed)"/>
  </g>

  <!-- =========================================================
       LAYER 3 — Figure construction: layered brushstrokes
       Path strategy:
       - Multiple overlapping paths simulate brush passes
       - Varying stroke-width for pressure variation
       - Some with wet-bleed filter for edge softness
       - Others sharp for confident line
       ========================================================= -->
  <g id="Layer_Figure" fill="#0E0E0E" stroke="#0E0E0E">

    <!-- Head / helmet (angular) — dry brush sharp -->
    <path d="M 288 210 L 296 186 L 320 180 L 340 192 L 344 218 L 332 236 L 308 244 L 292 236 Z"
          stroke-width="3" stroke-linejoin="miter"/>
    <!-- Head highlight / visor slit (negative space) -->
    <line x1="302" y1="218" x2="338" y2="214" stroke="#F5F0E0" stroke-width="3"/>

    <!-- Neck / collar -->
    <path d="M 302 244 L 330 244 L 332 258 L 300 258 Z" stroke-width="1"/>

    <!-- Shoulders — angular armor (wet edge suggests weight) -->
    <path d="M 260 268 L 284 256 L 340 256 L 374 268 L 380 300 L 348 296 L 286 296 L 256 300 Z"
          filter="url(#wetBleed)" stroke-width="2"/>
    <!-- Shoulder highlights / panel lines (negative space) -->
    <line x1="286" y1="296" x2="290" y2="272" stroke="#F5F0E0" stroke-width="1.5"/>
    <line x1="342" y1="296" x2="338" y2="272" stroke="#F5F0E0" stroke-width="1.5"/>

    <!-- Chest / torso — solid mass, one confident brushstroke -->
    <path d="M 288 298 L 342 298 L 354 370 L 344 440 L 286 440 L 278 370 Z"
          stroke-width="2"/>
    <!-- Chest panel negative space -->
    <path d="M 302 318 L 328 318 L 332 352 L 298 352 Z" fill="#F5F0E0"/>
    <line x1="315" y1="320" x2="315" y2="350" stroke="#0E0E0E" stroke-width="1"/>

    <!-- Left arm — extended holding weapon, tapered stroke -->
    <path d="M 258 302 L 234 340 L 208 396 L 188 460 L 184 478 L 192 480 L 214 468 L 238 410 L 262 356 L 276 310 Z"
          stroke-width="2" stroke-linejoin="round"/>

    <!-- Weapon / staff — thin gestural line with wet bleed -->
    <g filter="url(#wetBleed)">
      <path d="M 186 478 L 96 618" stroke-width="5" stroke-linecap="round"/>
      <path d="M 100 614 L 86 640" stroke-width="3" stroke-linecap="round"/>
    </g>
    <!-- Weapon tip (sharp) -->
    <path d="M 92 626 L 78 650 L 86 640 Z" fill="#0E0E0E"/>

    <!-- Right arm — bent at side -->
    <path d="M 358 300 L 390 320 L 410 370 L 406 430 L 398 440 L 380 420 L 372 380 L 358 330 Z"
          stroke-width="2"/>

    <!-- Hakama / flowing lower garment — gestural wet strokes -->
    <g filter="url(#wetBleed)">
      <path d="M 280 436 L 274 500 L 258 568 L 250 612 L 244 624 L 280 620 L 304 580 L 308 498 Z"
            stroke-width="2"/>
      <path d="M 346 436 L 352 500 L 368 568 L 376 612 L 382 624 L 346 620 L 322 580 L 318 498 Z"
            stroke-width="2"/>
    </g>
    <!-- Center fold line (negative space) -->
    <line x1="313" y1="440" x2="313" y2="618" stroke="#F5F0E0" stroke-width="3"/>

    <!-- Hakama movement / fabric lines (thin) -->
    <path d="M 266 508 Q 258 550 250 600" stroke="#0E0E0E" stroke-width="1" fill="none"/>
    <path d="M 290 510 Q 286 555 280 610" stroke="#0E0E0E" stroke-width="0.8" fill="none"/>
    <path d="M 336 510 Q 340 555 346 610" stroke="#0E0E0E" stroke-width="0.8" fill="none"/>
    <path d="M 360 508 Q 368 550 376 600" stroke="#0E0E0E" stroke-width="1" fill="none"/>

    <!-- Body gesture line on left side — confident brushstroke -->
    <path d="M 220 340 Q 204 420 214 490 Q 216 520 224 550"
          stroke-width="1.2" stroke-linecap="round" fill="none"/>

  </g>

  <!-- =========================================================
       LAYER 4 — Ink splatter / drip (energy)
       Small irregular dots around figure
       ========================================================= -->
  <g id="Layer_Splatter" fill="#0E0E0E">
    <circle cx="150" cy="520" r="2.5"/>
    <circle cx="142" cy="546" r="1.8"/>
    <circle cx="168" cy="590" r="1.2"/>
    <circle cx="132" cy="580" r="0.9"/>
    <circle cx="158" cy="620" r="2.2"/>
    <circle cx="144" cy="660" r="1"/>
    <circle cx="174" cy="668" r="0.6"/>

    <circle cx="436" cy="510" r="2.3"/>
    <circle cx="452" cy="544" r="1.4"/>
    <circle cx="428" cy="578" r="1"/>
    <circle cx="450" cy="608" r="1.9"/>
    <circle cx="462" cy="644" r="1.2"/>
    <circle cx="438" cy="666" r="0.7"/>

    <!-- Splatter above head (energy from strike) -->
    <circle cx="254" cy="172" r="1"/>
    <circle cx="242" cy="160" r="0.7"/>
    <circle cx="370" cy="168" r="1.3"/>
    <circle cx="386" cy="156" r="0.9"/>

    <!-- Drip lines (vertical streaks) -->
    <path d="M 150 520 L 150 556" stroke="#0E0E0E" stroke-width="0.8"/>
    <path d="M 452 544 L 452 578" stroke="#0E0E0E" stroke-width="0.6"/>
    <path d="M 450 608 L 450 635" stroke="#0E0E0E" stroke-width="0.5"/>
  </g>

  <!-- =========================================================
       LAYER 5 — Large gestural brushstroke background mark
       (empty-field energy mark — single bold gesture beyond figure)
       ========================================================= -->
  <g id="Layer_GestureMark" filter="url(#wetBleedMore)">
    <path d="M 80 140 Q 180 110 270 160 Q 280 172 268 178 Q 200 150 90 168"
          fill="#0E0E0E" fill-opacity="0.35"/>
    <path d="M 524 680 Q 460 694 420 724 Q 416 732 424 736 Q 490 720 540 702"
          fill="#0E0E0E" fill-opacity="0.25"/>
  </g>

  <!-- =========================================================
       LAYER 6 — Single Kanji calligraphy: 影 (KAGE / Shadow)
       Built from brush-feel strokes as SVG paths
       ========================================================= -->
  <g id="Layer_Kanji" fill="#0E0E0E" stroke="#0E0E0E" stroke-linecap="round" stroke-linejoin="round">
    <!-- "Kage" (Shadow) — simplified brush-stroke rendering -->
    <g transform="translate(460, 160)" filter="url(#wetBleed)">
      <!-- Sun radical (left) - simplified vertical box with horizontal mark -->
      <rect x="0" y="0" width="34" height="44" fill="none" stroke-width="4"/>
      <line x1="6" y1="22" x2="28" y2="22" stroke-width="3"/>
      <!-- Scenery / jing right side strokes (stylized abstract kanji interpretation) -->
      <path d="M 42 0 L 72 0" stroke-width="3.5"/>
      <path d="M 42 12 L 72 12" stroke-width="3"/>
      <path d="M 48 22 L 62 22" stroke-width="2.5"/>
      <path d="M 42 32 L 72 32" stroke-width="3"/>
      <path d="M 50 42 L 56 58" stroke-width="3"/>
      <path d="M 60 42 L 68 58" stroke-width="3"/>
      <!-- Sam (three strokes bottom — shadow/rays radical) -->
      <path d="M 8 58 Q 6 66 2 74" stroke-width="2.5" fill="none"/>
      <path d="M 22 58 Q 22 68 22 76" stroke-width="2.5" fill="none"/>
      <path d="M 36 58 Q 38 68 42 76" stroke-width="2.5" fill="none"/>
    </g>
  </g>

  <!-- =========================================================
       LAYER 7 — Red seal / stamp (signature element)
       ========================================================= -->
  <g id="Layer_Seal">
    <rect x="520" y="720" width="42" height="42" fill="#A33020"/>
    <!-- Seal carving (stylized Japanese characters — simplified marks) -->
    <g stroke="#F5F0E0" stroke-width="1.8" fill="none">
      <line x1="528" y1="730" x2="554" y2="730"/>
      <line x1="528" y1="737" x2="554" y2="737"/>
      <line x1="541" y1="730" x2="541" y2="752"/>
      <line x1="528" y1="746" x2="554" y2="746"/>
      <line x1="528" y1="752" x2="534" y2="752"/>
      <line x1="548" y1="752" x2="554" y2="752"/>
    </g>
  </g>

  <!-- =========================================================
       LAYER 8 — Minimal caption (no dominant typography — Shinkawa rule)
       ========================================================= -->
  <g id="Layer_Caption">
    <text x="60" y="758"
          font-family="'Noto Serif JP', 'Hiragino Mincho Pro', serif"
          font-size="8" fill="#0E0E0E" fill-opacity="0.65" letter-spacing="2">
      影 — KAGE / SHADOW · character study · 2077
    </text>
  </g>

</svg>
