<?xml version="1.0" encoding="UTF-8"?>
<!-- ================================================================
  SHOWCASE 04 / BEEPLE STYLE
  "EVERYDAY 5001" — fictional daily-art satirical piece
  8.5" x 11" vertical (612 x 792 @ 72dpi)

  Style profile applied: style-profiles/beeple.md
  Tactical rules enforced:
    - ONE massive 3D subject center, detailed environment around
    - Saturated neon accents against industrial grey/brown base
    - Weathered textures, grime, rust
    - Absurd juxtaposition (corporate-logo-adjacent in dystopian setting)
    - Low horizon — makes subject loom huge
    - Minimal typography, satirical sign text
    - Scale play — tiny humans near huge objects
================================================================= -->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="8.5in" height="11in"
     viewBox="0 0 612 792"
     preserveAspectRatio="xMidYMid meet">

  <defs>
    <!-- Industrial sky gradient (dirty orange → brown → grey) -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#3A1F0C"/>
      <stop offset="0.4"  stop-color="#6B3E0E"/>
      <stop offset="0.7"  stop-color="#8B5A2A"/>
      <stop offset="1"    stop-color="#A87240"/>
    </linearGradient>

    <!-- Dirty ground gradient -->
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#2C1F14"/>
      <stop offset="1"    stop-color="#0E0702"/>
    </linearGradient>

    <!-- Neon sign glow (hot pink) -->
    <radialGradient id="neonPink" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#FF0099" stop-opacity="1"/>
      <stop offset="0.6" stop-color="#FF0099" stop-opacity="0.3"/>
      <stop offset="1"   stop-color="#FF0099" stop-opacity="0"/>
    </radialGradient>

    <!-- Neon sign glow (cyan) -->
    <radialGradient id="neonCyan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#00FFFF" stop-opacity="1"/>
      <stop offset="0.5" stop-color="#00FFFF" stop-opacity="0.3"/>
      <stop offset="1"   stop-color="#00FFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Chrome metal gradient for hero object -->
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#E8E8E8"/>
      <stop offset="0.2"  stop-color="#B8B8B8"/>
      <stop offset="0.5"  stop-color="#5A5A5A"/>
      <stop offset="0.8"  stop-color="#3A3A3A"/>
      <stop offset="1"    stop-color="#1A1A1A"/>
    </linearGradient>

    <!-- Weathered/rust stain -->
    <pattern id="rust" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="none"/>
      <circle cx="3" cy="5" r="1.2" fill="#8B3A0E" fill-opacity="0.15"/>
      <circle cx="14" cy="12" r="0.8" fill="#6B2A08" fill-opacity="0.2"/>
      <circle cx="8" cy="16" r="0.6" fill="#5A1E04" fill-opacity="0.15"/>
    </pattern>

    <!-- Grime/grain overlay -->
    <pattern id="grime" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="3" fill="none"/>
      <circle cx="1" cy="1.5" r="0.3" fill="#000000" fill-opacity="0.08"/>
      <circle cx="2.3" cy="0.5" r="0.2" fill="#000000" fill-opacity="0.06"/>
    </pattern>

    <!-- Neon glow filter -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>

    <!-- Motion-blur atmospheric haze -->
    <filter id="atmospheric" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- =========================================================
       LAYER 1 — Dirty industrial sky
       ========================================================= -->
  <g id="Layer_Sky">
    <rect x="0" y="0" width="612" height="480" fill="url(#sky)"/>
  </g>

  <!-- =========================================================
       LAYER 2 — Distant skyline silhouettes (low horizon)
       ========================================================= -->
  <g id="Layer_DistantSkyline" opacity="0.8">
    <g fill="#1A0E04">
      <rect x="0"   y="440" width="40"  height="40"/>
      <rect x="40"  y="410" width="60"  height="70"/>
      <rect x="100" y="420" width="30"  height="60"/>
      <rect x="130" y="395" width="80"  height="85"/>
      <rect x="210" y="415" width="40"  height="65"/>
      <rect x="250" y="400" width="50"  height="80"/>
      <rect x="300" y="425" width="60"  height="55"/>
      <rect x="360" y="385" width="90"  height="95"/>
      <rect x="450" y="410" width="55"  height="70"/>
      <rect x="505" y="395" width="107" height="85"/>
      <!-- Tiny lit windows -->
    </g>
    <g fill="#FFB547" fill-opacity="0.7">
      <rect x="56"  y="422" width="2" height="3"/>
      <rect x="63"  y="430" width="2" height="2"/>
      <rect x="153" y="408" width="2" height="3"/>
      <rect x="160" y="420" width="2" height="3"/>
      <rect x="368" y="400" width="2" height="2"/>
      <rect x="378" y="412" width="2" height="3"/>
      <rect x="535" y="412" width="2" height="3"/>
    </g>
  </g>

  <!-- =========================================================
       LAYER 3 — Ground / road
       ========================================================= -->
  <g id="Layer_Ground">
    <rect x="0" y="480" width="612" height="312" fill="url(#ground)"/>
    <!-- Wet reflection highlight -->
    <rect x="0" y="480" width="612" height="30" fill="#8B5A2A" opacity="0.15"/>
    <!-- Road markings (perspective) -->
    <g fill="#5A4028" opacity="0.5">
      <polygon points="280,500 332,500 340,560 272,560"/>
      <polygon points="264,580 348,580 356,680 256,680"/>
      <polygon points="240,700 372,700 380,780 232,780"/>
    </g>
  </g>

  <!-- =========================================================
       LAYER 4 — Massive hero object: absurd chrome structure
       (A giant corporate-mascot-adjacent 3D figure — mixture of
       McDonald's arches logic + industrial crane aesthetic + skull)
       ========================================================= -->
  <g id="Layer_HeroObject">
    <!-- Base platform -->
    <polygon points="200,680 412,680 430,720 182,720" fill="#2A1E10"/>
    <polygon points="200,680 412,680 430,720 182,720" fill="url(#rust)"/>

    <!-- Central vertical column (huge) -->
    <rect x="280" y="260" width="52" height="430" fill="url(#chrome)"/>
    <rect x="280" y="260" width="52" height="430" fill="url(#rust)"/>
    <!-- Column weld seams -->
    <rect x="280" y="340" width="52" height="2" fill="#1A1A1A"/>
    <rect x="280" y="440" width="52" height="2" fill="#1A1A1A"/>
    <rect x="280" y="540" width="52" height="2" fill="#1A1A1A"/>

    <!-- Massive arch structure top (golden arches gone wrong) -->
    <path d="M 190 340 Q 306 140 422 340 L 416 340 Q 306 168 196 340 Z"
          fill="url(#chrome)"/>
    <path d="M 190 340 Q 306 140 422 340 L 416 340 Q 306 168 196 340 Z"
          fill="url(#rust)" opacity="0.6"/>

    <!-- Corporate smiley face attached to column (absurd juxtaposition) -->
    <circle cx="306" cy="420" r="52" fill="#FFD500"/>
    <circle cx="306" cy="420" r="52" fill="url(#grime)" opacity="0.6"/>
    <circle cx="306" cy="420" r="52" fill="none" stroke="#1A1A1A" stroke-width="3"/>
    <!-- Smile (weathered) -->
    <path d="M 280 432 Q 306 456 332 432" stroke="#1A1A1A" stroke-width="4" fill="none"/>
    <!-- Eyes -->
    <circle cx="288" cy="410" r="5" fill="#1A1A1A"/>
    <circle cx="324" cy="410" r="5" fill="#1A1A1A"/>
    <!-- Crack across face -->
    <path d="M 260 400 L 280 420 L 300 406 L 315 428 L 340 418 L 352 440"
          stroke="#1A1A1A" stroke-width="1.5" fill="none" opacity="0.85"/>

    <!-- Warning tape wrapped around column -->
    <rect x="280" y="580" width="52" height="18" fill="#FFD500"/>
    <g fill="#1A1A1A">
      <polygon points="280,580 290,580 285,598 275,598"/>
      <polygon points="295,580 305,580 300,598 290,598"/>
      <polygon points="310,580 320,580 315,598 305,598"/>
      <polygon points="325,580 335,580 330,598 320,598"/>
    </g>
  </g>

  <!-- =========================================================
       LAYER 5 — Neon signs with satirical text
       ========================================================= -->
  <g id="Layer_NeonSigns">
    <!-- Pink neon: "TRUST ME" -->
    <ellipse cx="120" cy="500" rx="80" ry="30" fill="url(#neonPink)" opacity="0.6"/>
    <rect x="60" y="478" width="120" height="40" fill="#1A0A14"
          stroke="#FF0099" stroke-width="2" filter="url(#neonGlow)"/>
    <text x="120" y="506" text-anchor="middle"
          font-family="Impact, sans-serif" font-size="22" font-weight="900"
          fill="#FF0099" filter="url(#neonGlow)">TRUST ME</text>
    <text x="120" y="506" text-anchor="middle"
          font-family="Impact, sans-serif" font-size="22" font-weight="900"
          fill="#FFFFFF">TRUST ME</text>

    <!-- Cyan neon: "BRAND IS LOVE" -->
    <ellipse cx="490" cy="520" rx="95" ry="28" fill="url(#neonCyan)" opacity="0.55"/>
    <rect x="410" y="500" width="160" height="38" fill="#0A1418"
          stroke="#00FFFF" stroke-width="2" filter="url(#neonGlow)"/>
    <text x="490" y="526" text-anchor="middle"
          font-family="'Arial Black', sans-serif" font-size="16" font-weight="900"
          fill="#00FFFF" filter="url(#neonGlow)">BRAND IS LOVE™</text>
    <text x="490" y="526" text-anchor="middle"
          font-family="'Arial Black', sans-serif" font-size="16" font-weight="900"
          fill="#FFFFFF">BRAND IS LOVE™</text>

    <!-- Small yellow sign on column -->
    <rect x="270" y="620" width="72" height="14" fill="#FFD500"/>
    <text x="306" y="631" text-anchor="middle"
          font-family="'Courier New', monospace" font-size="8"
          fill="#1A1A1A" font-weight="700">NOW 37% REALER</text>
  </g>

  <!-- =========================================================
       LAYER 6 — Tiny human figures for absurd scale
       ========================================================= -->
  <g id="Layer_TinyHumans">
    <!-- Three tiny silhouettes at base of massive structure -->
    <g fill="#000000">
      <!-- Figure 1 -->
      <rect x="228" y="690" width="3" height="12"/>
      <circle cx="229.5" cy="687" r="2.5"/>
      <!-- Figure 2 -->
      <rect x="240" y="692" width="3" height="11"/>
      <circle cx="241.5" cy="689" r="2.2"/>
      <!-- Figure 3 -->
      <rect x="376" y="691" width="3" height="12"/>
      <circle cx="377.5" cy="688" r="2.5"/>
      <!-- Figure 4 (with arm raised) -->
      <rect x="390" y="692" width="3" height="11"/>
      <circle cx="391.5" cy="689" r="2.2"/>
      <rect x="389" y="691" width="2" height="5" transform="rotate(-25 390 694)"/>
    </g>
    <!-- Caption under tiny humans -->
    <text x="306" y="720" text-anchor="middle"
          font-family="'Courier New', monospace" font-size="6"
          fill="#FFFFFF" fill-opacity="0.4" letter-spacing="3">~ THE WITNESSES ~</text>
  </g>

  <!-- =========================================================
       LAYER 7 — Atmospheric haze (motion-blur layer)
       ========================================================= -->
  <g id="Layer_Atmospheric" filter="url(#atmospheric)" opacity="0.4">
    <ellipse cx="306" cy="460" rx="280" ry="30" fill="#A87240"/>
  </g>

  <!-- =========================================================
       LAYER 8 — Fake barcode / branding marker
       ========================================================= -->
  <g id="Layer_Branding">
    <rect x="20" y="20" width="100" height="14" fill="#FFFFFF" opacity="0.85"/>
    <text x="70" y="30" text-anchor="middle"
          font-family="'Courier New', monospace" font-size="7"
          fill="#1A1A1A" font-weight="700">EVERYDAY.5001</text>
    <g transform="translate(20,40)" fill="#FFFFFF">
      <rect x="0" y="0" width="2" height="10"/>
      <rect x="4" y="0" width="1" height="10"/>
      <rect x="7" y="0" width="3" height="10"/>
      <rect x="13" y="0" width="1" height="10"/>
      <rect x="16" y="0" width="2" height="10"/>
      <rect x="20" y="0" width="4" height="10"/>
      <rect x="26" y="0" width="1" height="10"/>
      <rect x="29" y="0" width="2" height="10"/>
      <rect x="33" y="0" width="3" height="10"/>
      <rect x="38" y="0" width="1" height="10"/>
    </g>
  </g>

  <!-- =========================================================
       LAYER 9 — Top-right warning badge
       ========================================================= -->
  <g id="Layer_Warning">
    <polygon points="565,28 595,28 605,48 555,48" fill="#FFD500"
             stroke="#1A1A1A" stroke-width="1.5"/>
    <text x="580" y="42" text-anchor="middle"
          font-family="Impact, sans-serif" font-size="14" font-weight="900"
          fill="#1A1A1A">!</text>
  </g>

  <!-- =========================================================
       LAYER 10 — Grime overlay (entire composition)
       ========================================================= -->
  <g id="Layer_GrimeOverlay" style="mix-blend-mode:multiply">
    <rect x="0" y="0" width="612" height="792" fill="url(#grime)"/>
  </g>

  <!-- =========================================================
       LAYER 11 — Title footer (absurd)
       ========================================================= -->
  <g id="Layer_Footer">
    <rect x="0" y="762" width="612" height="30" fill="#000000" opacity="0.85"/>
    <text x="306" y="782" text-anchor="middle"
          font-family="'Courier New', monospace" font-size="10"
          fill="#FFD500" letter-spacing="4" font-weight="700">
      DAY 5001 / IT&apos;S ALL FINE / EVERYTHING&apos;S ON SALE
    </text>
  </g>

</svg>
