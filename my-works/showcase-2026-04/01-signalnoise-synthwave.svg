<?xml version="1.0" encoding="UTF-8"?>
<!-- ================================================================
  SHOWCASE 01 / SIGNALNOISE STYLE
  "NEON HORIZON" — fictional synthwave music event poster
  8.5" x 11" vertical (612 x 792 @ 72dpi)

  Style profile applied: style-profiles/james-white-signalnoise.md
  Tactical rules enforced:
    - Deep violet base (NOT pure black) — #1E0B3A
    - Sunset gradient sky (magenta → purple → indigo)
    - Perspective grid floor receding to central vanishing point
    - Sun circle upper half, gradient-filled
    - Triangle framing device around hero type
    - Chrome-gradient typography with metallic highlights
    - Mountain silhouettes in middle distance
    - 4-5 color relationship (magenta + cyan + orange + yellow + violet)
    - Grain overlay for 80s tactility
================================================================= -->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="8.5in" height="11in"
     viewBox="0 0 612 792"
     preserveAspectRatio="xMidYMid meet">

  <defs>
    <!-- Deep violet base -->
    <linearGradient id="violetBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#2A1550"/>
      <stop offset="0.5"  stop-color="#1E0B3A"/>
      <stop offset="1"    stop-color="#0E0625"/>
    </linearGradient>

    <!-- Sunset gradient sky: magenta → purple → indigo -->
    <linearGradient id="sunsetSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#F72585"/>
      <stop offset="0.25" stop-color="#B5179E"/>
      <stop offset="0.55" stop-color="#7209B7"/>
      <stop offset="0.85" stop-color="#3A0CA3"/>
      <stop offset="1"    stop-color="#1E0B3A"/>
    </linearGradient>

    <!-- Sun radial: orange core → pink edge → fade -->
    <radialGradient id="sunRadial" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#FEE440"/>
      <stop offset="0.3" stop-color="#FF6D00"/>
      <stop offset="0.65" stop-color="#F72585"/>
      <stop offset="1"   stop-color="#7209B7"/>
    </radialGradient>

    <!-- Chrome type gradient: silver with highlights -->
    <linearGradient id="chromeType" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#FFFFFF"/>
      <stop offset="0.2"  stop-color="#F5F5F5"/>
      <stop offset="0.45" stop-color="#B8B8B8"/>
      <stop offset="0.5"  stop-color="#FEE440"/>
      <stop offset="0.55" stop-color="#B8B8B8"/>
      <stop offset="0.85" stop-color="#7A7A7A"/>
      <stop offset="1"    stop-color="#2A2A2A"/>
    </linearGradient>

    <!-- Chrome outline for type -->
    <linearGradient id="chromeStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#F72585"/>
      <stop offset="1"   stop-color="#00D9FF"/>
    </linearGradient>

    <!-- Subtle film grain pattern -->
    <pattern id="filmGrain" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#FFFFFF" fill-opacity="0"/>
      <circle cx="1" cy="2" r="0.3" fill="#FFFFFF" fill-opacity="0.04"/>
      <circle cx="3" cy="1" r="0.3" fill="#FFFFFF" fill-opacity="0.03"/>
    </pattern>

    <!-- Glow filter for sun -->
    <filter id="sunGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- =========================================================
       LAYER 1 — Base (deep violet)
       ========================================================= -->
  <g id="Layer_Base">
    <rect x="0" y="0" width="612" height="792" fill="url(#violetBase)"/>
  </g>

  <!-- =========================================================
       LAYER 2 — Sunset Sky
       ========================================================= -->
  <g id="Layer_SunsetSky">
    <rect x="0" y="0" width="612" height="480" fill="url(#sunsetSky)"/>
  </g>

  <!-- =========================================================
       LAYER 3 — Sun + Radial Rays
       ========================================================= -->
  <g id="Layer_Sun">
    <!-- Sun disc -->
    <circle cx="306" cy="280" r="140" fill="url(#sunRadial)" filter="url(#sunGlow)"/>
    <!-- Horizontal cut bars through sun (80s signature) -->
    <rect x="160" y="300" width="292" height="4" fill="#1E0B3A" opacity="0.85"/>
    <rect x="160" y="315" width="292" height="3" fill="#1E0B3A" opacity="0.75"/>
    <rect x="160" y="330" width="292" height="2.5" fill="#1E0B3A" opacity="0.65"/>
    <rect x="160" y="345" width="292" height="2" fill="#1E0B3A" opacity="0.55"/>
    <rect x="160" y="360" width="292" height="1.5" fill="#1E0B3A" opacity="0.45"/>
    <rect x="160" y="375" width="292" height="1" fill="#1E0B3A" opacity="0.35"/>
  </g>

  <!-- =========================================================
       LAYER 4 — Mountain Silhouettes
       ========================================================= -->
  <g id="Layer_Mountains">
    <!-- Far mountains (light) -->
    <path d="M 0 440 L 80 395 L 140 415 L 200 385 L 280 410 L 340 390 L 420 415 L 500 395 L 612 420 L 612 460 L 0 460 Z"
          fill="#3A0CA3" opacity="0.7"/>
    <!-- Mid mountains (medium) -->
    <path d="M 0 455 L 60 430 L 130 440 L 200 420 L 280 435 L 360 425 L 450 440 L 540 430 L 612 445 L 612 470 L 0 470 Z"
          fill="#240865" opacity="0.9"/>
  </g>

  <!-- =========================================================
       LAYER 5 — Perspective Grid Floor
       ========================================================= -->
  <g id="Layer_GridFloor">
    <!-- Horizon line bright strip (where grid meets sky) -->
    <rect x="0" y="468" width="612" height="4" fill="#F72585" opacity="0.9"/>
    <rect x="0" y="466" width="612" height="1" fill="#00D9FF" opacity="0.7"/>

    <!-- Horizontal grid lines (spacing compresses toward horizon) -->
    <g stroke="#F72585" stroke-width="0.7" stroke-opacity="0.6" fill="none">
      <line x1="0" y1="478" x2="612" y2="478"/>
      <line x1="0" y1="488" x2="612" y2="488" stroke-opacity="0.65"/>
      <line x1="0" y1="502" x2="612" y2="502" stroke-opacity="0.7"/>
      <line x1="0" y1="522" x2="612" y2="522" stroke-opacity="0.72"/>
      <line x1="0" y1="548" x2="612" y2="548" stroke-opacity="0.74"/>
      <line x1="0" y1="582" x2="612" y2="582" stroke-opacity="0.78"/>
      <line x1="0" y1="625" x2="612" y2="625" stroke-opacity="0.82"/>
      <line x1="0" y1="678" x2="612" y2="678" stroke-opacity="0.85" stroke-width="0.8"/>
      <line x1="0" y1="740" x2="612" y2="740" stroke-opacity="0.9" stroke-width="0.9"/>
    </g>
    <!-- Vertical grid lines converging to vanishing point (306, 468) -->
    <g stroke="#00D9FF" stroke-width="0.6" stroke-opacity="0.55" fill="none">
      <line x1="306" y1="468" x2="-350" y2="792"/>
      <line x1="306" y1="468" x2="-150" y2="792"/>
      <line x1="306" y1="468" x2="0"    y2="792"/>
      <line x1="306" y1="468" x2="110"  y2="792"/>
      <line x1="306" y1="468" x2="200"  y2="792"/>
      <line x1="306" y1="468" x2="266"  y2="792"/>
      <line x1="306" y1="468" x2="306"  y2="792"/>
      <line x1="306" y1="468" x2="346"  y2="792"/>
      <line x1="306" y1="468" x2="412"  y2="792"/>
      <line x1="306" y1="468" x2="502"  y2="792"/>
      <line x1="306" y1="468" x2="612"  y2="792"/>
      <line x1="306" y1="468" x2="762"  y2="792"/>
      <line x1="306" y1="468" x2="962"  y2="792"/>
    </g>
  </g>

  <!-- =========================================================
       LAYER 6 — Triangle framing device around hero type
       ========================================================= -->
  <g id="Layer_TriangleFrame">
    <polygon points="306,75 506,525 106,525" fill="none"
             stroke="#F72585" stroke-width="1.5" stroke-opacity="0.85"/>
    <polygon points="306,85 494,520 118,520" fill="none"
             stroke="#00D9FF" stroke-width="0.6" stroke-opacity="0.6"/>
    <!-- Tick marks on triangle vertices -->
    <circle cx="306" cy="75" r="4" fill="#FEE440"/>
    <circle cx="506" cy="525" r="4" fill="#FEE440"/>
    <circle cx="106" cy="525" r="4" fill="#FEE440"/>
  </g>

  <!-- =========================================================
       LAYER 7 — Hero Chrome Typography
       ========================================================= -->
  <g id="Layer_HeroType">
    <!-- "NEON" large with chrome fill -->
    <text x="306" y="180" text-anchor="middle"
          font-family="Impact, 'Arial Black', sans-serif"
          font-size="88" font-weight="900" letter-spacing="4"
          fill="url(#chromeType)"
          stroke="#F72585" stroke-width="1" stroke-opacity="0.7"
          font-style="italic">NEON</text>

    <!-- "HORIZON" larger -->
    <text x="306" y="265" text-anchor="middle"
          font-family="Impact, 'Arial Black', sans-serif"
          font-size="76" font-weight="900" letter-spacing="6"
          fill="url(#chromeType)"
          stroke="#00D9FF" stroke-width="1" stroke-opacity="0.6"
          font-style="italic">HORIZON</text>
  </g>

  <!-- =========================================================
       LAYER 8 — Subtitle with italic slant ("ski goggle")
       ========================================================= -->
  <g id="Layer_Subtitle">
    <line x1="120" y1="310" x2="220" y2="310" stroke="#FEE440" stroke-width="1.2"/>
    <line x1="392" y1="310" x2="492" y2="310" stroke="#FEE440" stroke-width="1.2"/>
    <text x="306" y="316" text-anchor="middle"
          font-family="'Courier New', monospace"
          font-size="11" font-weight="700"
          fill="#FEE440" letter-spacing="10">
      SYNTHWAVE · NIGHTS · 2077
    </text>
  </g>

  <!-- =========================================================
       LAYER 9 — Three Live Acts List
       ========================================================= -->
  <g id="Layer_LineupList">
    <text x="306" y="560" text-anchor="middle"
          font-family="'Courier New', monospace" font-size="9"
          fill="#00D9FF" letter-spacing="6">
      · LIVE TONIGHT ·
    </text>

    <g font-family="Impact, 'Arial Black', sans-serif"
       font-size="28" font-weight="900"
       text-anchor="middle" letter-spacing="2"
       fill="#FFFFFF">
      <text x="306" y="600" fill="url(#chromeType)" font-style="italic">THE MIDNIGHT</text>
      <text x="306" y="635" fill="url(#chromeType)" font-style="italic">CARPENTER BRUT</text>
      <text x="306" y="670" fill="url(#chromeType)" font-style="italic">COM TRUISE</text>
    </g>
  </g>

  <!-- =========================================================
       LAYER 10 — Event Details Block
       ========================================================= -->
  <g id="Layer_EventDetails">
    <rect x="60" y="702" width="492" height="38" fill="none"
          stroke="#F72585" stroke-width="1" opacity="0.9"/>
    <rect x="66" y="708" width="480" height="26" fill="none"
          stroke="#00D9FF" stroke-width="0.5" opacity="0.6"/>

    <g font-family="'Courier New', monospace" font-size="9"
       fill="#FFFFFF" letter-spacing="2">
      <text x="90" y="722" fill="#FEE440">AUG·15·2077</text>
      <text x="90" y="732" fill="#FFFFFF" font-size="7" fill-opacity="0.85">FRI / DOORS 20:00</text>
      <text x="306" y="728" text-anchor="middle" fill="#F72585" font-weight="700">
        ELECTRIC BALLROOM
      </text>
      <text x="522" y="722" text-anchor="end" fill="#FEE440">NEO-TOKYO</text>
      <text x="522" y="732" text-anchor="end" fill="#FFFFFF" font-size="7" fill-opacity="0.85">$45 / 18+</text>
    </g>
  </g>

  <!-- =========================================================
       LAYER 11 — Corner geometric accents
       ========================================================= -->
  <g id="Layer_CornerAccents">
    <!-- Top left palm-adjacent triangle -->
    <polygon points="30,30 30,60 60,30" fill="#F72585" opacity="0.8"/>
    <polygon points="30,30 30,50 50,30" fill="#FEE440" opacity="0.9"/>
    <!-- Top right -->
    <polygon points="582,30 582,60 552,30" fill="#00D9FF" opacity="0.8"/>
    <polygon points="582,30 582,50 562,30" fill="#FEE440" opacity="0.9"/>
    <!-- Bottom left -->
    <polygon points="30,762 30,732 60,762" fill="#F72585" opacity="0.8"/>
    <!-- Bottom right -->
    <polygon points="582,762 582,732 552,762" fill="#00D9FF" opacity="0.8"/>
  </g>

  <!-- =========================================================
       LAYER 12 — Footer / credits
       ========================================================= -->
  <g id="Layer_Footer">
    <text x="306" y="770" text-anchor="middle"
          font-family="'Courier New', monospace" font-size="6"
          fill="#FFFFFF" fill-opacity="0.6" letter-spacing="3">
      PRESENTED BY PRISMATIC RECORDS · SIGNALNOISE.FM
    </text>
  </g>

  <!-- =========================================================
       LAYER 13 — Film grain overlay (very subtle)
       ========================================================= -->
  <g id="Layer_FilmGrain" style="mix-blend-mode:screen">
    <rect x="0" y="0" width="612" height="792" fill="url(#filmGrain)"/>
  </g>

</svg>
