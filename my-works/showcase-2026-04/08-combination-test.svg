<?xml version="1.0" encoding="UTF-8"?>
<!-- ================================================================
  SHOWCASE 08 / COMBINATION TEST
  "STATIC // SIGNAL" — profile synthesis stress test
  8.5" x 11" vertical (612 x 792 @ 72dpi)

  Experiment: apply three profiles simultaneously, each governing
  a different DIMENSION of the design.

    - COMPOSITION: Ash Thorp
        horizon-anchored, massive negative space, HUD corners,
        concentric hero construct with tick marks
    - TYPOGRAPHY: David Carson
        multiple fonts clashing, tilted, overlapping, partial off-page,
        hand-drawn annotations, broken hierarchy
    - PALETTE: Yoji Shinkawa
        bone white paper + ink black + oxblood red accent (ONLY 3 colors)

  Expected result: Thorp's quiet orderly structure DISRUPTED by
  Carson chaos, rendered in Shinkawa's ink restraint. A polite scream.

  This is deliberately uncomfortable. Validates that profiles
  encode independent dimensions — they can be mixed, producing
  recognizable hybrids rather than mush.
================================================================= -->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="8.5in" height="11in"
     viewBox="0 0 612 792"
     preserveAspectRatio="xMidYMid meet">

  <defs>
    <!-- Shinkawa bone-white paper -->
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#F5F0E0"/>
      <stop offset="1"   stop-color="#EAE3D1"/>
    </linearGradient>

    <!-- Paper fiber -->
    <pattern id="paperTex" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="none"/>
      <circle cx="2" cy="3" r="0.25" fill="#0E0E0E" fill-opacity="0.03"/>
      <circle cx="5" cy="1" r="0.2"  fill="#0E0E0E" fill-opacity="0.025"/>
    </pattern>

    <!-- Wet ink bleed -->
    <filter id="wetBleed" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.7"/>
    </filter>
  </defs>

  <!-- =========================================================
       LAYER 1 — Shinkawa paper (PALETTE rule)
       ========================================================= -->
  <g id="Layer_Paper">
    <rect x="0" y="0" width="612" height="792" fill="url(#paper)"/>
    <rect x="0" y="0" width="612" height="792" fill="url(#paperTex)"/>
  </g>

  <!-- =========================================================
       LAYER 2 — Thorp HUD corners (COMPOSITION rule)
       Four corner L-brackets with micro-readouts
       ========================================================= -->
  <g id="Layer_ThorpHUDCorners">
    <g stroke="#0E0E0E" stroke-width="0.5" fill="none">
      <!-- Top-left bracket -->
      <polyline points="28,60 28,28 60,28"/>
      <!-- Top-right bracket -->
      <polyline points="552,28 584,28 584,60"/>
      <!-- Bottom-left bracket -->
      <polyline points="28,732 28,764 60,764"/>
      <!-- Bottom-right bracket -->
      <polyline points="552,764 584,764 584,732"/>
    </g>

    <!-- Corner readouts (Courier mono, tiny) -->
    <g font-family="'Courier New', monospace" font-size="6.5"
       fill="#0E0E0E" fill-opacity="0.75" letter-spacing="1">
      <text x="66" y="34">CONTINUUM / TEST.08</text>
      <text x="66" y="44">LAT 47.3°N  139.7°E</text>
      <text x="66" y="54">CHANNEL 00 / STATIC</text>
      <text x="546" y="34" text-anchor="end">2026.04.15 / 18:47</text>
      <text x="546" y="44" text-anchor="end">COMBO:T+C+S</text>
      <text x="546" y="54" text-anchor="end">SIG [==----] 37%</text>
    </g>
  </g>

  <!-- =========================================================
       LAYER 3 — Thorp concentric hero construct (COMPOSITION rule)
       Rendered in Shinkawa ink black instead of Thorp's usual cyan
       ========================================================= -->
  <g id="Layer_ThorpConstruct">
    <g transform="translate(306,380)" fill="none" stroke="#0E0E0E">
      <!-- Rings with decreasing opacity -->
      <circle r="170" stroke-width="0.4" stroke-opacity="0.25"/>
      <circle r="130" stroke-width="0.5" stroke-opacity="0.45"/>
      <circle r="92"  stroke-width="0.6" stroke-opacity="0.7"/>
      <circle r="58"  stroke-width="0.8" stroke-opacity="0.95"/>

      <!-- Cardinal tick marks -->
      <line x1="-176" y1="0"  x2="-130" y2="0"  stroke-width="0.6"/>
      <line x1="130"  y1="0"  x2="176"  y2="0"  stroke-width="0.6"/>
      <line x1="0"    y1="-176" x2="0" y2="-130" stroke-width="0.6"/>
      <line x1="0"    y1="130"  x2="0" y2="176"  stroke-width="0.6"/>

      <!-- Radial ticks every 30° -->
      <g stroke-width="0.4" stroke-opacity="0.45">
        <g transform="rotate(30)">  <line y1="-170" y2="-176"/></g>
        <g transform="rotate(60)">  <line y1="-170" y2="-176"/></g>
        <g transform="rotate(120)"> <line y1="-170" y2="-176"/></g>
        <g transform="rotate(150)"> <line y1="-170" y2="-176"/></g>
        <g transform="rotate(210)"> <line y1="-170" y2="-176"/></g>
        <g transform="rotate(240)"> <line y1="-170" y2="-176"/></g>
        <g transform="rotate(300)"> <line y1="-170" y2="-176"/></g>
        <g transform="rotate(330)"> <line y1="-170" y2="-176"/></g>
      </g>

      <!-- SHINKAWA RED ACCENT: center dot + small arc (palette rule) -->
      <circle r="3" fill="#A33020" stroke="none"/>
      <path d="M 58 0 A 58 58 0 0 1 50.2 29"
            stroke="#A33020" stroke-width="1.4" stroke-opacity="0.95" fill="none"/>
    </g>
  </g>

  <!-- =========================================================
       LAYER 4 — Thorp horizon line (COMPOSITION rule)
       ========================================================= -->
  <g id="Layer_Horizon">
    <line x1="36" y1="505" x2="576" y2="505"
          stroke="#0E0E0E" stroke-width="0.5" stroke-opacity="0.55"/>
    <!-- Shinkawa-style red seal dot at horizon (combining rules) -->
    <circle cx="306" cy="505" r="4" fill="#A33020"/>

    <!-- Tiny distant silhouettes (Thorp scale move) -->
    <g fill="#0E0E0E" fill-opacity="0.25">
      <rect x="220" y="495" width="3" height="10"/>
      <rect x="228" y="490" width="4" height="15"/>
      <rect x="238" y="493" width="2" height="12"/>
      <rect x="380" y="492" width="3" height="13"/>
      <rect x="388" y="488" width="4" height="17"/>
    </g>
  </g>

  <!-- =========================================================
       LAYER 5 — CARSON TYPOGRAPHY (all hell breaks loose)
       Main title: clashing fonts, partial off-page, tilted, overlapping
       Multiple fonts: Impact + Georgia + Courier + Brush + Sans
       ========================================================= -->

  <!-- Part 1: "STATIC" huge sans, partial off-left-edge -->
  <g id="Layer_Type_STATIC">
    <text x="-20" y="200"
          font-family="Impact, 'Arial Black', sans-serif"
          font-size="172" font-weight="900" letter-spacing="-8"
          fill="#0E0E0E">STATIC</text>
  </g>

  <!-- Part 2: "//" tiny handwritten, off-axis -->
  <g id="Layer_Type_Slashes" transform="rotate(12 484 180)">
    <text x="460" y="186"
          font-family="'Brush Script MT', cursive"
          font-size="46" font-weight="700" fill="#A33020">
      //
    </text>
  </g>

  <!-- Part 3: "Signal" italic serif, displaced right, different baseline -->
  <g id="Layer_Type_Signal">
    <text x="296" y="258"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="88" font-weight="900" font-style="italic"
          letter-spacing="-3" fill="#0E0E0E">signal.</text>
  </g>

  <!-- Part 4: Tiny Carson annotation overlap on hero construct -->
  <g id="Layer_CarsonAnnotation" transform="rotate(-7 124 410)">
    <text x="80" y="410"
          font-family="'Brush Script MT', cursive" font-size="14"
          fill="#A33020" font-style="italic" font-weight="700">
      is this thing
    </text>
    <text x="80" y="426"
          font-family="'Brush Script MT', cursive" font-size="14"
          fill="#A33020" font-style="italic" font-weight="700">
      even on?
    </text>
    <!-- Hand-drawn arrow pointing to center -->
    <path d="M 150 432 Q 200 430 250 400"
          stroke="#A33020" stroke-width="1.5" fill="none"/>
    <path d="M 248 402 L 254 396 M 248 402 L 254 408"
          stroke="#A33020" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Part 5: Dingbats paragraph (Carson homage)
       Mock "interview answer" in symbol-shapes — unreadable -->
  <g id="Layer_Dingbats" transform="rotate(2 420 595)">
    <text x="380" y="595"
          font-family="'Courier New', monospace" font-size="7"
          fill="#0E0E0E" fill-opacity="0.7" letter-spacing="3">
      Q: DESCRIBE THE EXPERIMENT
    </text>
    <g font-family="'Zapf Dingbats', 'Wingdings', Arial" font-size="12"
       fill="#0E0E0E" letter-spacing="2">
      <text x="380" y="612">✦ ✧ ❋ ❀ ◆ ✺ ❃ ◆ ✦ ✧</text>
      <text x="380" y="626">❋ ❀ ✦ ✺ ◇ ❁ ✧ ❋ ❃ ✦</text>
      <text x="380" y="640">✧ ◆ ❀ ✦ ✺ ❋ ❁ ◇ ✦ ❃</text>
    </g>
  </g>

  <!-- Part 6: Mixed-font caption (serif + mono + script in one line)
       Below combination of fonts demonstrates Carson chaos -->
  <g id="Layer_MixedCaption">
    <text x="56" y="480"
          font-family="Georgia, serif" font-size="13"
          fill="#0E0E0E" font-style="italic">We made a thing.</text>
    <text x="170" y="480"
          font-family="'Courier New', monospace" font-size="10"
          fill="#0E0E0E" letter-spacing="3">IT DOESN&apos;T</text>
    <text x="260" y="482"
          font-family="'Brush Script MT', cursive" font-size="17"
          fill="#A33020" font-style="italic" font-weight="700">
      want to be
    </text>
    <text x="350" y="480"
          font-family="Impact, sans-serif" font-size="14" font-weight="900"
          fill="#0E0E0E" letter-spacing="2">
      A THING.
    </text>
  </g>

  <!-- =========================================================
       LAYER 6 — Shinkawa red seal / stamp (palette signature)
       ========================================================= -->
  <g id="Layer_Seal">
    <rect x="520" y="720" width="42" height="42" fill="#A33020"/>
    <g stroke="#F5F0E0" stroke-width="1.8" fill="none">
      <line x1="528" y1="730" x2="554" y2="730"/>
      <line x1="528" y1="737" x2="554" y2="737"/>
      <line x1="541" y1="730" x2="541" y2="752"/>
      <line x1="528" y1="746" x2="554" y2="746"/>
      <line x1="528" y1="752" x2="534" y2="752"/>
      <line x1="548" y1="752" x2="554" y2="752"/>
    </g>
  </g>

  <!-- =========================================================
       LAYER 7 — Shinkawa splatter dots (palette mood)
       Small ink drops, carefully placed — NOT a grunge layer,
       small signature energy marks
       ========================================================= -->
  <g id="Layer_Splatter" fill="#0E0E0E">
    <circle cx="54"  cy="250" r="1.8"/>
    <circle cx="66"  cy="268" r="0.9"/>
    <circle cx="44"  cy="280" r="0.6"/>
    <circle cx="564" cy="260" r="1.2"/>
    <circle cx="578" cy="276" r="0.8"/>
    <circle cx="158" cy="620" r="1.4"/>
    <circle cx="172" cy="632" r="0.7"/>
  </g>

  <!-- =========================================================
       LAYER 8 — Thorp-style bottom info strip (COMPOSITION rule)
       ========================================================= -->
  <g id="Layer_BottomInfo">
    <line x1="56" y1="696" x2="200" y2="696" stroke="#0E0E0E" stroke-width="0.4"/>
    <line x1="412" y1="696" x2="556" y2="696" stroke="#0E0E0E" stroke-width="0.4"/>

    <g font-family="'Courier New', monospace" font-size="7"
       fill="#0E0E0E" fill-opacity="0.85">
      <text x="56" y="712">COMPOSITION: A. Thorp (horizon + corners + construct)</text>
      <text x="56" y="723">TYPOGRAPHY:  D. Carson  (5 fonts, tilted, overlapping, off-page)</text>
      <text x="56" y="734">PALETTE:     Y. Shinkawa (bone + ink + oxblood)</text>
      <text x="56" y="745">RESULT:      polite structure disrupted by chaos, rendered in ink</text>
    </g>
  </g>

  <!-- =========================================================
       LAYER 9 — Meta label (what this document IS)
       ========================================================= -->
  <g id="Layer_MetaLabel">
    <text x="306" y="780" text-anchor="middle"
          font-family="Georgia, serif" font-size="8"
          fill="#0E0E0E" fill-opacity="0.6" font-style="italic">
      SHOWCASE 08 — PROFILE SYNTHESIS STRESS TEST (THORP × CARSON × SHINKAWA)
    </text>
  </g>

</svg>
