<?xml version="1.0" encoding="UTF-8"?>
<!-- ================================================================
  TRENDS SHOWCASE 01 — Kenya Hara × Bento Grid
  "Stilla" — fictional wellness app landing hero
  1440 × 900

  Style profile : style-profiles/kenya-hara.md
  Trend         : docs/trends-2026.md § Bento Grid

  Why this works:
  - Hara's palette (warm whites, kraft, near-black) is already the
    2026 quiet-luxury palette — bento shapes it into the current
    modular hero format instead of a pure minimalist landscape.
  - 60–80% warm white stays Hara-pure. The grid is Hara-quiet:
    no shadows, hairline dividers, one accent kraft card.
  - Typography is Hara — wide tracked grotesk, near-black, no bold.
================================================================= -->
<svg xmlns="http://www.w3.org/2000/svg"
     width="1440" height="900" viewBox="0 0 1440 900"
     preserveAspectRatio="xMidYMid meet">

  <defs>
    <!-- Warm-white paper ground with subtle variance -->
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"  stop-color="#FBF8F0"/>
      <stop offset="1"  stop-color="#F5F0E6"/>
    </linearGradient>

    <!-- Kraft accent card -->
    <linearGradient id="kraft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"  stop-color="#D4C8A8"/>
      <stop offset="1"  stop-color="#C8BFA4"/>
    </linearGradient>

    <!-- Very subtle paper grain -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.06
                             0 0 0 0 0.05
                             0 0 0 0 0.04
                             0 0 0 0.04 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Hero image: abstract breath circles -->
    <radialGradient id="breath" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0"   stop-color="#E8DDC0"/>
      <stop offset="0.6" stop-color="#D4C8A8"/>
      <stop offset="1"   stop-color="#C8BFA4" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <!-- Paper ground -->
  <rect width="1440" height="900" fill="url(#paper)"/>
  <rect width="1440" height="900" fill="transparent" filter="url(#grain)" opacity="0.35"/>

  <!-- ── HEADLINE OUTSIDE THE GRID ─────────────────────────── -->
  <g font-family="Inter, Helvetica, sans-serif" fill="#0E0E0E">
    <!-- tiny wordmark -->
    <text x="80" y="78" font-size="13" letter-spacing="4" font-weight="400">STILLA</text>
    <!-- tiny nav -->
    <g font-size="11" letter-spacing="2" font-weight="400" fill="#4A463C">
      <text x="1150" y="78">PRACTICE</text>
      <text x="1240" y="78">JOURNAL</text>
      <text x="1325" y="78">SIGN&#160;IN</text>
    </g>

    <!-- headline — Hara voice: light, widely tracked, quiet -->
    <text x="80" y="220" font-size="58" font-weight="300" letter-spacing="-1">Breath before anything.</text>
    <text x="80" y="268" font-size="18" font-weight="300" fill="#4A463C" letter-spacing="0.3">
      A seven-minute practice for the first hour of the day.
    </text>
  </g>

  <!-- ── BENTO GRID ─────────────────────────────────────────
       6 cards on a 3×2 module, hero spans 2 columns.
       Grid start x=80, y=340.
       Gutter 20.
       Cell 420 × 240.
       Card radius 20.
       Hairline stroke #D4C8A8 at 1px. No shadows.
  ──────────────────────────────────────────────────────── -->
  <g>
    <!-- Card 1: HERO (spans 2 cols) — "Breath" visualisation -->
    <g>
      <rect x="80" y="340" width="860" height="240" rx="20" fill="#F2EADB"/>
      <!-- three concentric breath circles -->
      <g transform="translate(510,460)" opacity="0.9">
        <circle r="120" fill="none" stroke="#C8BFA4" stroke-width="1"/>
        <circle r="88"  fill="none" stroke="#C8BFA4" stroke-width="1"/>
        <circle r="56"  fill="url(#breath)"/>
      </g>
      <text x="110" y="380" font-family="Inter,Helvetica,sans-serif" font-size="11" letter-spacing="3" fill="#6A6356">NOW PLAYING</text>
      <text x="110" y="420" font-family="Inter,Helvetica,sans-serif" font-size="28" font-weight="300" fill="#0E0E0E">Box breath, 4 × 4 × 4 × 4</text>
      <text x="110" y="450" font-family="Inter,Helvetica,sans-serif" font-size="14" font-weight="300" fill="#4A463C">Round 3 of 7 · 02:41 remaining</text>
      <!-- play control -->
      <g transform="translate(110, 520)">
        <circle cx="20" cy="0" r="18" fill="#0E0E0E"/>
        <polygon points="15,-8 15,8 27,0" fill="#FBF8F0"/>
        <text x="56" y="5" font-family="Inter,Helvetica,sans-serif" font-size="13" letter-spacing="2" fill="#4A463C">PAUSE</text>
      </g>
    </g>

    <!-- Card 2: Streak -->
    <g>
      <rect x="960" y="340" width="400" height="240" rx="20" fill="#FBF8F0" stroke="#D4C8A8" stroke-width="1"/>
      <text x="990" y="380" font-family="Inter,Helvetica,sans-serif" font-size="11" letter-spacing="3" fill="#6A6356">STREAK</text>
      <text x="990" y="470" font-family="Inter,Helvetica,sans-serif" font-size="96" font-weight="200" fill="#0E0E0E">21</text>
      <text x="1090" y="470" font-family="Inter,Helvetica,sans-serif" font-size="18" font-weight="300" fill="#4A463C">days</text>
      <!-- mini dots week -->
      <g transform="translate(990,510)">
        <g fill="#0E0E0E">
          <circle cx="0" cy="0" r="5"/><circle cx="20" cy="0" r="5"/>
          <circle cx="40" cy="0" r="5"/><circle cx="60" cy="0" r="5"/>
          <circle cx="80" cy="0" r="5"/><circle cx="100" cy="0" r="5"/>
        </g>
        <circle cx="120" cy="0" r="5" fill="none" stroke="#0E0E0E" stroke-width="1"/>
      </g>
      <text x="990" y="540" font-family="Inter,Helvetica,sans-serif" font-size="11" letter-spacing="2" fill="#6A6356">Today pending</text>
    </g>

    <!-- Card 3: Heart variability -->
    <g>
      <rect x="80" y="600" width="420" height="240" rx="20" fill="#FBF8F0" stroke="#D4C8A8" stroke-width="1"/>
      <text x="110" y="640" font-family="Inter,Helvetica,sans-serif" font-size="11" letter-spacing="3" fill="#6A6356">HRV — 7 DAYS</text>
      <!-- sparkline -->
      <polyline points="110,760 150,748 190,740 230,720 270,735 310,712 350,705 390,722 430,700 470,690"
                fill="none" stroke="#0E0E0E" stroke-width="1.5"/>
      <!-- baseline -->
      <line x1="110" y1="770" x2="470" y2="770" stroke="#C8BFA4" stroke-width="1" stroke-dasharray="2 4"/>
      <text x="110" y="680" font-family="Inter,Helvetica,sans-serif" font-size="28" font-weight="300" fill="#0E0E0E">62 ms</text>
      <text x="180" y="680" font-family="Inter,Helvetica,sans-serif" font-size="14" font-weight="300" fill="#4A463C">(+4 vs. last week)</text>
      <text x="110" y="810" font-family="Inter,Helvetica,sans-serif" font-size="11" letter-spacing="2" fill="#6A6356">Recovery improving</text>
    </g>

    <!-- Card 4: Sleep -->
    <g>
      <rect x="520" y="600" width="420" height="240" rx="20" fill="url(#kraft)"/>
      <text x="550" y="640" font-family="Inter,Helvetica,sans-serif" font-size="11" letter-spacing="3" fill="#3A342A">LAST NIGHT</text>
      <text x="550" y="690" font-family="Inter,Helvetica,sans-serif" font-size="64" font-weight="200" fill="#0E0E0E">7:42</text>
      <text x="730" y="690" font-family="Inter,Helvetica,sans-serif" font-size="16" font-weight="300" fill="#3A342A">asleep</text>
      <!-- stacked sleep bar -->
      <g transform="translate(550,730)">
        <rect x="0"   y="0" width="80"  height="14" fill="#0E0E0E"/>
        <rect x="82"  y="0" width="160" height="14" fill="#4A463C"/>
        <rect x="244" y="0" width="100" height="14" fill="#6A6356"/>
        <text x="0" y="40" font-family="Inter,Helvetica,sans-serif" font-size="10" letter-spacing="2" fill="#3A342A">DEEP · CORE · REM</text>
      </g>
    </g>

    <!-- Card 5: Quote -->
    <g>
      <rect x="960" y="600" width="400" height="115" rx="20" fill="#FBF8F0" stroke="#D4C8A8" stroke-width="1"/>
      <text x="990" y="635" font-family="Inter,Helvetica,sans-serif" font-size="11" letter-spacing="3" fill="#6A6356">TODAY</text>
      <text x="990" y="670" font-family="Inter,Helvetica,sans-serif" font-size="16" font-weight="300" font-style="italic" fill="#0E0E0E">
        <tspan x="990" dy="0">"Emptiness is not absence;</tspan>
        <tspan x="990" dy="20"> it is the container for anything."</tspan>
      </text>
    </g>

    <!-- Card 6: CTA -->
    <g>
      <rect x="960" y="725" width="400" height="115" rx="20" fill="#0E0E0E"/>
      <text x="990" y="760" font-family="Inter,Helvetica,sans-serif" font-size="11" letter-spacing="3" fill="#9A9486">BEGIN</text>
      <text x="990" y="800" font-family="Inter,Helvetica,sans-serif" font-size="22" font-weight="300" fill="#FBF8F0">Start today's practice</text>
      <text x="990" y="825" font-family="Inter,Helvetica,sans-serif" font-size="11" letter-spacing="2" fill="#9A9486">7 minutes · Box breath</text>
      <!-- arrow -->
      <g transform="translate(1320,782)" stroke="#FBF8F0" stroke-width="1.2" fill="none">
        <line x1="-14" y1="0" x2="0" y2="0"/>
        <polyline points="-5,-5 0,0 -5,5"/>
      </g>
    </g>
  </g>

  <!-- footer hairline -->
  <line x1="80" y1="876" x2="1360" y2="876" stroke="#D4C8A8" stroke-width="1"/>
  <g font-family="Inter,Helvetica,sans-serif" font-size="10" letter-spacing="2" fill="#6A6356">
    <text x="80"   y="894">V 2026.4 · TOKYO · LONDON</text>
    <text x="1260" y="894">MADE WITH CARE</text>
  </g>
</svg>
